<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Arcade Brick Breaker</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin: 0 0 10px 0;
            color: #38bdf8;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.6);
            font-size: 24px;
        }
        .ui-panel {
            width: 480px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 18px;
            color: #94a3b8;
        }
        #score-display {
            color: #4ade80;
        }
        #canvas-container {
            position: relative;
            border: 4px solid #334155;
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            background: #020617;
        }
        canvas {
            display: block;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.85);
            border-radius: 4px;
            transition: opacity 0.3s ease;
        }
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .btn {
            background: #0284c7;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 15px;
            box-shadow: 0 4px 0 #0369a1;
            transition: all 0.1s ease;
        }
        .btn:hover {
            background: #0ea5e9;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #0369a1;
        }
        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>ARCADE BREAKER</h1>
    
    <div class="ui-panel">
        <div>SCORE: <span id="score-display">0000</span></div>
        <div>LIVES: <span id="lives-display">3</span></div>
    </div>

    <div id="canvas-container">
        <canvas id="gameCanvas" width="480" height="400"></canvas>
        
        <div id="start-overlay" class="overlay">
            <div style="font-size: 20px; text-align: center; color: #38bdf8;">READY PLAYER ONE</div>
            <button class="btn" id="start-btn">START GAME</button>
            <div class="instructions">Use LEFT / RIGHT arrow keys or Mouse to move</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score-display");
        const livesDisplay = document.getElementById("lives-display");
        const startOverlay = document.getElementById("start-overlay");
        const startBtn = document.getElementById("start-btn");

        // --- AUDIO SYNTHESIZER (Web Audio API) ---
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            
            // Resume context if suspended (browser autoplay policy security)
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'paddleHit') {
                // Short mid-tone bleep
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } 
            else if (type === 'brickHit') {
                // Crisp retro crash sound
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.12);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                osc.start(now);
                osc.stop(now + 0.12);
            } 
            else if (type === 'loseLife') {
                // Rapidly descending warning tone
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.linearRampToValueAtTime(60, now + 0.4);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } 
            else if (type === 'victory') {
                // Arpeggio / Level up fan-fare chime
                osc.type = 'square';
                const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
                notes.forEach((freq, index) => {
                    const timeOffset = index * 0.1;
                    const oscNode = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscNode.type = 'square';
                    oscNode.frequency.setValueAtTime(freq, now + timeOffset);
                    gainNode.gain.setValueAtTime(0.15, now + timeOffset);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + timeOffset + 0.15);
                    oscNode.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscNode.start(now + timeOffset);
                    oscNode.stop(now + timeOffset + 0.15);
                });
            }
        }

        // --- GAME VARIABLES ---
        let score = 0;
        let lives = 3;
        let gameRunning = false;

        // Paddle Configuration
        const paddleHeight = 12;
        const paddleWidth = 75;
        let paddleX = (canvas.width - paddleWidth) / 2;
        let rightPressed = false;
        let leftPressed = false;

        // Ball Configuration
        let ballRadius = 6;
        let x = canvas.width / 2;
        let y = canvas.height - 30;
        let dx = 3;
        let dy = -3;

        // Bricks Layout
        const brickRowCount = 5;
        const brickColumnCount = 7;
        const brickWidth = 54;
        const brickHeight = 16;
        const brickPadding = 8;
        const brickOffsetTop = 40;
        const brickOffsetLeft = 28;

        const brickColors = ["#ef4444", "#f97316", "#f59e0b", "#10b981", "#3b82f6"];
        let bricks = [];

        function initBricks() {
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1, color: brickColors[r] };
                }
            }
        }

        // --- INPUT LISTENERS ---
        document.addEventListener("keydown", keyDownHandler, false);
        document.addEventListener("keyup", keyUpHandler, false);
        document.addEventListener("mousemove", mouseMoveHandler, false);

        function keyDownHandler(e) {
            if (e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
            else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
        }

        function keyUpHandler(e) {
            if (e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
            else if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
        }

        function mouseMoveHandler(e) {
            const relativeX = e.clientX - canvas.getBoundingClientRect().left;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
            }
        }

        // --- COLLISION LOGIC ---
        function collisionDetection() {
            let activeBricks = 0;
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    let b = bricks[c][r];
                    if (b.status === 1) {
                        activeBricks++;
                        if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy;
                            b.status = 0;
                            score += 10;
                            scoreDisplay.textContent = String(score).padStart(4, '0');
                            playSound('brickHit');
                        }
                    }
                }
            }
            
            // Check if all bricks are cleared
            if (activeBricks === 0 && gameRunning) {
                playSound('victory');
                alert("YOU WIN, CONGRATULATIONS!");
                resetGameStage();
