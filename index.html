<!doctype html> 
<html lang="en"> 
<head> 
<meta charset="utf-8" /> 
<meta name="viewport" content="width=device-width,initial-scale=1" /> 
<title>Dodger</title> 
<link href="https://googleapis.com" rel="stylesheet"> 
<style> 
:root{--bg:#04040a;--panel:#0f1222;--accent:#ff4081;--accent2:#00e6b8;--muted:#9aa3b2;--gold:#ffd700;--cyber:#00ffff;--neon-pink:#ff00ff} 
html,body{height:100%;margin:0;background:linear-gradient(180deg,#02020a 0%, #05112a 60%, #071026 100%);font-family:'Orbitron',sans-serif;color:var(--accent2);-webkit-font-smoothing:antialiased;overflow-x:hidden} 
#game-box{width:100%;max-width:980px;margin:18px auto;padding:18px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(0,0,0,0.06));box-shadow:0 6px 30px rgba(1,1,6,0.5);border:1px solid rgba(0,230,184,0.08)} 
header{display:flex;align-items:center;justify-content:space-between;gap:12px} 
h1#title{cursor:pointer;margin:0;color:var(--accent2);font-size:22px;display:flex;align-items:center;gap:8px;transition:all 0.3s;user-select:none} 
h1#title:hover{color:var(--accent);text-shadow:0 0 10px var(--accent)} 
.controls-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap} 
.icon-btn{background:transparent;border:1px solid rgba(255,255,255,0.04);padding:6px 8px;border-radius:8px;color:var(--muted);cursor:pointer;font-weight:700;transition:all 0.2s} 
.icon-btn:hover{background:rgba(255,64,129,0.1);color:var(--accent);box-shadow:0 0 8px rgba(255,64,129,0.2)} 
.icon-btn.active{color:var(--cyber);box-shadow:0 0 12px var(--cyber)} 
.hud{display:flex;justify-content:space-between;align-items:center;margin-top:8px;flex-wrap:wrap;gap:8px} 
.hud .left,.hud .center,.hud .right{flex:1;min-width:120px} 
.hud .center{text-align:center;font-size:13px;color:var(--gold);font-weight:700;animation:pulse 1.5s infinite} 
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}} 
.hud .left{font-size:12px;color:var(--accent2)} 
.hud .right{font-size:12px;color:#ff7bd6;text-align:right} 
canvas{display:block;margin:12px auto;border-radius:10px;background:transparent;box-shadow:0 6px 18px rgba(0,0,0,0.6),0 0 20px rgba(0,230,184,0.1);outline:none;border:2px solid rgba(255,64,129,0.08)} 
.sub{color:var(--muted);font-size:11px;margin-top:6px;line-height:1.4} 
.overlay{position:fixed;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;justify-content:center;pointer-events:none;background:rgba(0,0,0,0.7);z-index:1000} 
.panel{pointer-events:auto;background:linear-gradient(135deg,rgba(15,18,34,.99),rgba(4,4,10,.98));padding:20px;border-radius:14px;color:#fff;box-shadow:0 0 30px rgba(0,230,184,0.2),inset 0 1px 0 rgba(255,255,255,0.1);min-width:280px;max-height:75vh;overflow-y:auto;border:1px solid rgba(0,230,184,0.2)} 
.panel h2{margin:0 0 12px 0;font-size:20px;color:var(--accent);text-shadow:0 0 10px rgba(255,64,129,0.3)} 
.panel h3{margin:8px 0 4px 0;font-size:14px;color:var(--cyber)} 
.btn{background:linear-gradient(90deg,var(--accent),#ffea00);border:none;padding:10px 16px;border-radius:8px;font-weight:700;color:#05060a;cursor:pointer;margin-top:8px;transition:all 0.2s;box-shadow:0 4px 12px rgba(255,64,129,0.2)} 
.btn:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(255,64,129,0.4)} 
.btn:active{transform:scale(0.96)} 
.btn.secondary{background:linear-gradient(90deg,var(--cyber),#00ffaa);color:#000} 
.btn.disabled{opacity:0.5;cursor:not-allowed} 
.btn.disabled:hover{transform:none} 
.small{font-size:11px;color:var(--muted);margin-top:6px} 
.stat-bar{width:100%;height:8px;background:rgba(0,0,0,0.5);border-radius:4px;margin:6px 0;overflow:hidden;border:1px solid rgba(0,230,184,0.2)} 
.stat-fill{height:100%;background:linear-gradient(90deg,var(--cyber),var(--accent2));transition:width 0.3s} 
@media (max-width:700px){canvas{width:92vw;height:92vw;max-height:92vh}#touch-controls{display:flex!important;gap:4px;justify-content:space-between;margin-top:10px}.touch-btn{flex:1;padding:12px;border-radius:10px;background:rgba(255,64,129,0.2);border:2px solid rgba(255,64,129,0.4);color:var(--accent2);font-weight:700;cursor:pointer;font-size:20px;transition:all 0.2s}.touch-btn:active{background:rgba(255,64,129,0.5);transform:scale(0.95)}} 
.floating{position:absolute;pointer-events:none;transform:translate(-50%,-50%);white-space:nowrap;font-weight:700;text-shadow:0 0 4px rgba(0,0,0,0.8)} 
.achievement{position:fixed;left:20px;top:20px;background:rgba(0,0,0,0.85);padding:12px 16px;border-radius:10px;color:var(--cyber);border:2px solid var(--cyber);animation:slideInOut 4.2s ease-in-out;font-weight:700;box-shadow:0 0 15px var(--cyber)} 
@keyframes slideInOut{0%{transform:translateX(-150%);opacity:0}5%{transform:translateX(0);opacity:1}95%{transform:translateX(0);opacity:1}100%{transform:translateX(-150%);opacity:0}} 
.shop-grid{display:flex;flex-direction:column;gap:10px} 
.shop-item{display:flex;justify-content:space-between;align-items:center;background:rgba(0,230,184,0.05);padding:10px;border-radius:8px;border:1px solid rgba(0,230,184,0.1);transition:all 0.2s} 
.shop-item:hover{background:rgba(0,230,184,0.1);border-color:rgba(0,230,184,0.3)} 
.shop-item.owned{background:rgba(0,230,184,0.08);opacity:0.7} 
.shop-item .details{flex:1} 
.shop-item strong{color:var(--accent);display:block;margin-bottom:3px} 
.leaderboard{max-height:300px;overflow-y:auto} 
.lb-row{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;transition:all 0.2s} 
.lb-row:hover{background:rgba(0,230,184,0.05)} 
.lb-row.top3{background:rgba(255,215,0,0.1);border-left:3px solid var(--gold)} 
.lb-rank{color:var(--gold);font-weight:700;min-width:40px} 
.lb-name{flex:1;color:var(--accent2);margin-left:8px} 
.lb-score{color:var(--cyber);text-align:right;font-weight:700} 
.perk-badge{display:inline-block;background:rgba(0,255,255,0.2);color:var(--cyber);padding:2px 6px;border-radius:4px;font-size:10px;margin:2px;border:1px solid rgba(0,255,255,0.4)} 
.energy-bar{display:flex;gap:2px;margin-top:4px} 
.energy-dot{width:6px;height:6px;background:var(--cyber);border-radius:50%;opacity:0.6} 
.energy-dot.active{opacity:1;box-shadow:0 0 4px var(--cyber)} 
</style> 
</head> 
<body> 
<div id="game-box"> 
<header> 
<h1 id="title"><span class="logo">🌌</span> Cosmic Dodger — Premium</h1> 
<div class="controls-top"> 
<button id="muteBtn" class="icon-btn">🔊</button> 
<button id="fsBtn" class="icon-btn">⤢</button> 
<button id="statsBtn" class="icon-btn">📈 Stats</button> 
<button id="shopBtn" class="icon-btn">🏪 Shop</button> 
<button id="lbBtn" class="icon-btn">🏆 Scores</button> 
</div> 
</header> 
<div class="hud"> 
<div class="left" id="player-hud">LIVES: 3 | LVL 1</div> 
<div class="center" id="score-hud">SCORE: 0 ×1.00</div> 
<div class="right" id="ai-hud">DRONES: 0 | WAVE: 1</div> 
</div>
<div style="position:relative"> 
<canvas id="canvas" width="900" height="900" tabindex="1"></canvas> 
<div id="overlay" class="overlay" style="display:none"><div class="panel" id="panel"></div></div> 
</div> 
<div class="sub">⌨️ Arrow Keys to move • SPACE to shoot • Shift+Click title 3x for hidden features</div> 
<div class="controls" id="touch-controls" style="display:none"> 
<button class="touch-btn" id="btn-left">◀</button> 
<button class="touch-btn" id="btn-fire">●</button> 
<button class="touch-btn" id="btn-right">▶</button> 
</div> 
</div> 
<div id="achievementBox" class="achievement" style="display:none"></div> 
<script> 
// ======================== HIGH-TECH PERKS SYSTEM ======================== 
const PERKS = {
  rapid_fire: { name: 'Rapid Fire I', cost: 1500, desc: '↑30% fire rate permanently', category: 'weapon', effect: ()=>{ player.rate *= 0.7; } },
  rapid_fire_ii: { name: 'Hyper-Drive Loops', cost: 6500, desc: '↑50% extreme fire rate booster', category: 'weapon', effect: ()=>{ player.rate *= 0.5; } },
  spread_shot: { name: 'Spread Shot', cost: 5000, desc: 'Fire 3 projectiles at once', category: 'weapon', tempDuration: 12000 },
  laser_cannon: { name: 'Laser Cannon', cost: 2000, desc: '↑Damage output by 50%', category: 'weapon', effect: ()=>{ player.dmg = 1.5; } },
  plasma_slugs: { name: 'Plasma Slugs', cost: 8500, desc: 'Lasers deal triple baseline damage', category: 'weapon', effect: ()=>{ player.dmg = 3.0; } },
  quantum_split: { name: 'Quantum Split', cost: 12000, desc: 'Clone projectiles in flight', category: 'weapon' },
  antimatter_beams: { name: 'Singularity Core', cost: 25000, desc: 'Ultimate weapon: Massive base splash damage', category: 'weapon', effect: ()=>{ player.dmg = 5.0; } },
  shield_gen: { name: 'Shield Generator', cost: 800, desc: 'Absorb 3 hits instantly', category: 'defense', effect: ()=>{ player.shield = 3; } },
  auto_shield: { name: 'Auto-Shield', cost: 4500, desc: 'Auto-regen 1 shield/5 sec', category: 'defense', passive: true },
  energy_shield: { name: 'Energy Shield Matrix', cost: 7500, desc: 'Reflect 50% of incoming fire', category: 'defense', passive: true },
  phase_shift: { name: 'Phase Shift Engaged', cost: 9000, desc: 'Become invulnerable for 6 sec', category: 'defense', tempDuration: 6000, effect: ()=>{ player.invul = 360; } },
  titanium_hull: { name: 'Titanium Plating', cost: 15000, desc: 'Increases structural health limit to 5 lives', category: 'defense', effect: ()=>{ player.lives = 5; } },
  time_slow: { name: 'Chrono Matrix', cost: 3500, desc: 'Slow time for 8 sec', category: 'utility', tempDuration: 8000, effect: ()=>{ timeSlowActive = true; } },
  emp_burst: { name: 'EMP Stun Blast', cost: 5500, desc: 'Stun enemies for 3 sec', category: 'utility', tempDuration: 3000 },
  magnetic_collector: { name: 'Mag-Collector', cost: 8000, desc: 'Pulls items towards you automatically', category: 'utility', passive: true },
// ======================== Canvas & Audio ======================== 
const cvs = document.getElementById('canvas'); const ctx = cvs.getContext('2d'); 
resizeCanvas(); window.addEventListener('resize', resizeCanvas); 
function resizeCanvas(){ const ratio = window.devicePixelRatio || 1; const size = Math.min(1100, Math.max(640, Math.floor(Math.min(window.innerWidth*0.9, 980)))); cvs.width = size * ratio; cvs.height = size * ratio; ctx.scale(ratio, ratio); } 
let audioCtx, masterGain, musicNode; let muted = false; 
function ensureAudio(){ if (!audioCtx){ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination); masterGain.gain.value = 0.07; } } 
function toggleMute(){ muted = !muted; if (masterGain) masterGain.gain.value = muted ? 0 : 0.07; document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊'; } 
function startMusic(){ try{ const o1 = audioCtx.createOscillator(); const o2 = audioCtx.createOscillator(); const g = audioCtx.createGain(); o1.type='sine'; o2.type='sine'; o1.frequency.value = 110; o2.frequency.value = 165; o1.connect(g); o2.connect(g); g.connect(masterGain); g.gain.value = 0.02; o1.start(); o2.start(); o1.stop(audioCtx.currentTime + 999999); o2.stop(audioCtx.currentTime + 999999); }catch(e){} } 
function sfx(type,pitch=1,when=0){ try{ ensureAudio(); const t = audioCtx.currentTime + when; if (type==='shoot'){ const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='sawtooth'; o.frequency.value=180*pitch; o.connect(g); g.connect(masterGain); g.gain.setValueAtTime(0.04,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.1); o.start(t); o.stop(t+0.1); } else if(type==='hit'){ const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(200*pitch,t); o.frequency.exponentialRampToValueAtTime(80*pitch,t+0.15); o.connect(g); g.connect(masterGain); g.gain.setValueAtTime(0.05,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.15); o.start(t); o.stop(t+0.15); } }catch(e){} } 
// ======================== Game State ======================== 
const DIFFICULTY = { astBase: 18, ftrBase: 140, astScoreScale: 180, ftrScoreScale: 24, enemyHpBase: 3, enemySpeedBase: 2.6, bossHpMultiplier: 1.5, pickupFreqMultiplier: 1.3 }; 
let score = 0, multiplier = 1, comboTimer = 0, frame = 0, isOver = true, running = false, timeSlowActive = false, screenShakeIntensity = 0; 
let asteroids = [], enemies = [], lasers = [], bullets = [], pickups = [], particles = [], floats = []; 
let activeBoss = null, bossStage = 0, wave = 0, chaosMode = false; let activePerkTimers = {}, perkProcs = 0; const keys = { left:false, right:false, fire:false, shift:false }; 
const player = { x: 450, y: 820, w:28, h:24, speed:7.2, cooldown:0, rate:10, health:1, lives:3, shield:0, shieldTimer:0, spread:false, rapid:false, skin:'default', dmg:1, energy:100, maxEnergy:100 }; 
const aiAlpha = { x: 160, y: 820, w:24, h:20, speed:4.8, cooldown:0, alive:true, respawn:0, moveDir:1, moveTimer:0 }; const aiBeta = { x: 560, y: 820, w:24, h:20, speed:5.6, cooldown:0, alive:false, respawn:0, moveDir:1, moveTimer:0 }; const aiGamma = { x: 360, y: 820, w:20, h:18, speed:6, cooldown:0, alive:false, respawn:0, moveDir:1, moveTimer:0 }; 
function applyShopOwned(){ shopOwned = JSON.parse(localStorage.getItem(SHOP_KEYS.OWNED) || '[]'); activePerkTimers = {}; perkProcs = 0; for (let perkId of shopOwned) { const p = PERKS[perkId]; if (p && p.effect && !p.tempDuration) { p.effect(); } if (p && p.passive) { activePerkTimers[perkId] = true; } } } applyShopOwned(); 
const overlay = document.getElementById('overlay'); const panel = document.getElementById('panel'); const title = document.getElementById('title'); const scoreHud = document.getElementById('score-hud'); const playerHud = document.getElementById('player-hud'); const aiHud = document.getElementById('ai-hud'); const btnLeft = document.getElementById('btn-left'); const btnRight = document.getElementById('btn-right'); const btnFire = document.getElementById('btn-fire'); 
if (btnLeft){ btnLeft.addEventListener('touchstart', ()=>keys.left=true); btnLeft.addEventListener('touchend', ()=>keys.left=false); } if (btnRight){ btnRight.addEventListener('touchstart', ()=>keys.right=true); btnRight.addEventListener('touchend', ()=>keys.right=false); } if (btnFire){ btnFire.addEventListener('touchstart', ()=>keys.fire=true); btnFire.addEventListener('touchend', ()=>keys.fire=false); } 
window.addEventListener('keydown',(e)=>{ if (e.key==='ArrowLeft'){ e.preventDefault(); keys.left=true; } if (e.key==='ArrowRight'){ e.preventDefault(); keys.right=true; } if (e.key===' '){ e.preventDefault(); keys.fire=true; if(isOver && !running) startGame(); } if (e.key==='Shift') keys.shift=true; }); 
window.addEventListener('keyup',(e)=>{ if (e.key==='ArrowLeft') keys.left=false; if (e.key==='ArrowRight') keys.right=false; if (e.key===' ') keys.fire=false; if (e.key==='Shift') keys.shift=false; }); 
let clickCount = 0; title.addEventListener('click',(e)=>{ if (keys.shift){ clickCount++; if (clickCount>=3){ clickCount = 0; if (!shopOwned.includes('cheat_drone')){ shopOwned.push('cheat_drone'); localStorage.setItem(SHOP_KEYS.OWNED, JSON.stringify(shopOwned)); } aiBeta.alive=true; aiBeta.x = player.x + 40; aiBeta.respawn=0; aiGamma.alive=true; aiGamma.x = player.x - 40; aiGamma.respawn=0; unlockAchievement('hidden_unlock', 'CLASSIFIED ACCESS GRANTED'); if (isOver) startGame(); } } else { clickCount=0; if (isOver) startGame(); } }); 
function spawnAsteroid(){ const W = cvs.width/(window.devicePixelRatio||1); asteroids.push({ x: Math.random()*(W-40), y:-30-Math.random()*80, size:18+Math.random()*46, speed:(timeSlowActive?1.8:2.6)+Math.random()*3.2, spin:Math.random()*0.08-0.04, rot:0 }); } 
function spawnEnemy(){ const W = cvs.width/(window.devicePixelRatio||1); enemies.push({ x:Math.random()*(W-36), y:-20, size:18, hp: (chaosMode?4: DIFFICULTY.enemyHpBase + Math.floor(Math.random()*2)), speed:(timeSlowActive?1.2:(chaosMode?2.8:DIFFICULTY.enemySpeedBase)) + Math.random()*1.2, cooldown: 60+Math.random()*80 }); } 
function spawnPickup(x,y){ const types=['rapid','shield','spread','bomb','score','homing','energy']; const t=types[Math.floor(Math.random()*types.length)]; pickups.push({ x,y,type:t,vy:1.2,t:t }); } 
function spawnParticles(x,y,color,count=18,spread=2){ for(let i=0;i<count;i++){ const a=Math.random()*Math.PI*2; const s=Math.random()*spread+0.6; particles.push({ x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:100,color:color }); } } 
function showFloating(txt,x,y,color='#fff'){ floats.push({txt,x,y,color,alpha:1,life:90}); } 
function rectHit(aX,aY,aW,aH,bX,bY,bW,bH){ return aX < bX + bW && aX + aW > bX && aY < bY + bH && aY + aH > bY; } 
function updateHUD(){ scoreHud.innerText = `SCORE: ${score} ×${(multiplier).toFixed(2)}`; playerHud.innerText = `LIVES: ${player.lives} | LVL ${playerLevel}`; aiHud.innerText = `DRONES: ${[aiAlpha,aiBeta,aiGamma].filter(a=>a.alive).length} | WAVE: ${wave}`; } 
function startGame(){ ensureAudio(); score=0; multiplier=1; comboTimer=0; frame=0; isOver=false; running=true; asteroids=[]; enemies=[]; lasers=[]; bullets=[]; pickups=[]; particles=[]; floats.length=0; activeBoss=null; bossStage=0; wave=1; timeSlowActive=false; screenShakeIntensity=0; respawnPlayer(); startMusic(); loop(); } 
function respawnPlayer(){ const W = cvs.width/(window.devicePixelRatio||1); const H = cvs.height/(window.devicePixelRatio||1); player.x=W/2 - player.w/2; player.y=H-100; player.cooldown=0; player.invul=120; player.shieldTimer=0; } 
function endGame(){ isOver=true; running=false; overlay.style.display='flex'; saveScore(); panel.innerHTML=`<h2>💥 MISSION FAILED 💥</h2><div style="margin-top:10px"><strong>Final Score:</strong> ${score}</div><div style="margin-top:8px;font-size:12px">📊 Level: ${playerLevel} | XP: ${Math.floor(playerXP)}</div><button class="btn" onclick="location.reload()">Play Again</button><button class="btn secondary" onclick="openLeaderboard()">View Scores</button>`; } 
function maybeSpawnBoss(){ if (!activeBoss){ if (score > (chaosMode?800:350) && bossStage===0){ bossStage=1; spawnBoss(1);} else if (score > (chaosMode?2200:900) && bossStage===1){ bossStage=2; spawnBoss(2); } else if (score > (chaosMode?4000:1500) && bossStage===2){ bossStage=3; spawnBoss(3); wave++; } } } 
function spawnBoss(type){ const W = cvs.width/(window.devicePixelRatio||1); if (type===1) activeBoss={name:'VANGUARD',x:120,y:-120,w:160,h:46,hp:Math.floor(140 * DIFFICULTY.bossHpMultiplier),maxHp:Math.floor(140 * DIFFICULTY.bossHpMultiplier),cooldown:40,pattern:0,patternTimer:0}; else if(type===2) activeBoss={name:'SENTINEL',x:W/2-80,y:-120,w:160,h:40,hp:Math.floor(220 * DIFFICULTY.bossHpMultiplier),maxHp:Math.floor(220 * DIFFICULTY.bossHpMultiplier),cooldown:30,pattern:0,patternTimer:0}; else if(type===3) activeBoss={name:'OMEGA',x:W/2-100,y:-140,w:200,h:50,hp:Math.floor(300 * DIFFICULTY.bossHpMultiplier),maxHp:Math.floor(300 * DIFFICULTY.bossHpMultiplier),cooldown:25,pattern:0,patternTimer:0}; }
