<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Cyberband Neo Pro</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --border-color: #30363d;
            --accent-active: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.4);
            --text-main: #c9d1d9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        h1 {
            color: #ffffff;
            margin: 0 0 5px 0;
            font-size: 1.8rem;
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
        }

        p {
            color: #8b949e;
            margin: 0 0 20px 0;
            font-size: 0.9rem;
            text-align: center;
        }

        .sequencer-container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 95vw; /* Keeps the panel from jumping off-screen */
            box-sizing: border-box;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
            background-color: #0d1117;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        button {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }

        button:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }

        button.playing {
            background-color: #238636;
            color: #ffffff;
            border-color: #2ea44f;
            box-shadow: 0 0 12px rgba(46, 164, 79, 0.5);
        }

        .bpm-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: #8b949e;
            font-size: 0.85rem;
        }

        input[type="range"] {
            cursor: pointer;
            accent-color: var(--accent-active);
        }

        /* Fixed Grid Wrapper: Adds a nice scrollbar so it never vanishes */
        .grid-wrapper {
            width: 100%;
            overflow-x: auto; 
            padding-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 180px repeat(16, 1fr); /* Fits label + controls nicely */
            gap: 6px;
            min-width: 750px; /* Forces layout to remain intact */
        }

        .row-control-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
            background: #0d1117;
            padding: 4px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .row-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #8b949e;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .vol-slider {
            width: 100%;
            height: 4px;
        }

        .pad {
            aspect-ratio: 1;
            background-color: #21262d;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.1s, box-shadow 0.1s;
        }

        .pad:hover {
            background-color: #30363d;
        }

        /* Active color bands per section */
        .grid div[data-row="0"].active, .grid div[data-row="1"].active { background-color: #ff7b72; border-color: #ffa198; }
        .grid div[data-row="2"].active, .grid div[data-row="3"].active { background-color: #79c0ff; border-color: #c9d1d9; }
        .grid div[data-row="4"].active, .grid div[data-row="5"].active { background-color: #d2a8ff; border-color: #e8d5ff; }
        .grid div[data-row="6"].active, .grid div[data-row="7"].active { background-color: #3fb950; border-color: #56d364; }

        .pad.current-step {
            outline: 2px solid #ffffff;
            outline-offset: 1px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>🚀 Cyberband Neo Pro</h1>
    <p>Build a production-grade live loop track right from your GitHub dashboard!</p>

    <div class="sequencer-container">
        <div class="controls">
            <button id="playBtn">START BEAT</button>
            <button id="clearBtn">CLEAR ALL</button>
            <div class="bpm-container">
                <span>SPEED:</span>
                <input type="range" id="bpmSlider" min="60" max="200" value="120">
                <span id="bpmVal">120 BPM</span>
            </div>
        </div>

        <div class="grid-wrapper">
            <div class="grid" id="sequencerGrid">
                <!-- Labels, Volume controls, and pads generate here securely -->
            </div>
        </div>
    </div>

    <script>
        const tracks = ['Heavy Kick', 'Deep Snare', 'Open Hat', 'Closed Hat', 'Synth Low', 'Synth Mid', 'Synth High', 'Laser SFX'];
        const steps = 16; 
        
        let isPlaying = false;
        let currentStep = 0;
        let intervalId = null;
        let audioCtx = null;
        let bpm = 120;

        const grid = document.getElementById('sequencerGrid');
        const playBtn = document.getElementById('playBtn');
        const clearBtn = document.getElementById('clearBtn');
        const bpmSlider = document.getElementById('bpmSlider');
        const bpmVal = document.getElementById('bpmVal');

        const gridState = tracks.map(() => Array(steps).fill(false));
        // Array to track custom volume multiplier per track (0.0 to 1.0)
        const trackVolumes = Array(tracks.length).fill(0.5); 

        // Generate grid elements safely
        tracks.forEach((trackName, rowIndex) => {
            // Container for label + volume slider
            const controlBox = document.createElement('div');
            controlBox.className = 'row-control-box';

            const label = document.createElement('div');
            label.className = 'row-label';
            label.textContent = trackName;
            controlBox.appendChild(label);

            const volSlider = document.createElement('input');
            volSlider.type = 'range';
            volSlider.className = 'vol-slider';
            volSlider.min = '0';
            volSlider.max = '1';
            volSlider.step = '0.1';
            volSlider.value = '0.5';
            volSlider.addEventListener('input', (e) => {
                trackVolumes[rowIndex] = parseFloat(e.target.value);
            });
            controlBox.appendChild(volSlider);
            
            grid.appendChild(controlBox);

            for (let colIndex = 0; colIndex < steps; colIndex++) {
                const pad = document.createElement('div');
                pad.className = 'pad';
                pad.dataset.row = rowIndex;
                pad.dataset.col = colIndex;

                pad.addEventListener('click', () => {
                    gridState[rowIndex][colIndex] = !gridState[rowIndex][colIndex];
                    pad.classList.toggle('active');
                });

                grid.appendChild(pad);
            }
        });

        function playSound(trackIndex) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            // Mix master volume math configuration
            const trackVol = trackVolumes[trackIndex]; 

            switch(trackIndex) {
                case 0: // Heavy Kick
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.4);
                    gain.gain.setValueAtTime(1.2 * trackVol, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                    break;
                case 1: // Deep Snare
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(220, now);
                    osc.frequency.exponentialRampToValueAtTime(80, now + 0.25);
                    gain.gain.setValueAtTime(0.8 * trackVol, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now); osc.stop(now + 0.25);
                    break;
                case 2: // Open Hat
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(9000, now);
                    gain.gain.setValueAtTime(0.25 * trackVol, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                    break;
                case 3: // Closed Hat
                    osc.type = 'square';
