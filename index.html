<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mad Face Fury Arena</title>
    <style>
        body { background: #0a0010; color: #ff0055; font-family: 'Arial Black', sans-serif; text-align: center; margin: 0; padding: 15px; user-select: none; }
        .arcade-box { max-width: 420px; margin: 10px auto; background: #140024; border: 4px solid #ff0055; box-shadow: 0 0 20px #ff0055; padding: 15px; border-radius: 8px; }
        
        /* The Big Shifting Mad Face Display Panel */
        .boss-monitor { background: #000; border: 2px solid #00ffff; padding: 10px; margin-bottom: 15px; position: relative; }
        #boss-emoji { font-size: 75px; margin: 5px 0; text-shadow: 0 0 15px #ff0000; transition: transform 0.1s; }
        #phase-name { font-size: 16px; color: #00ffff; font-family: monospace; font-weight: bold; }
        
        /* Master Grid Layout Matrix Slots */
        .whack-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .grid-slot { height: 85px; background: #240a36; border: 2px solid #441166; border-radius: 6px; position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 35px; }
        .active-target { background: #ff0055; border-color: #fff; box-shadow: 0 0 15px #ff0055; animation: targetGlow 0.3s infinite alternate; }
        
        /* UI Stat Bars Layout */
        .bar-wrap { background: #222; width: 100%; height: 16px; border: 1px solid #fff; margin-top: 5px; overflow: hidden; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.15s; }
        
        .btn-action { background: #00ffff; color: #000; border: 2px solid #fff; padding: 12px 30px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 0 10px #00ffff; }
        .btn-action:disabled { background: #224444; color: #555; border-color: #333; box-shadow: none; cursor: not-allowed; }
        
        @keyframes targetGlow { 0% { transform: scale(0.96); } 100% { transform: scale(1.04); } }
    </style>
</head>
<body>

<div class="arcade-box">
    <!-- Evolving Mad Face Monitor Display Header -->
    <div class="boss-monitor">
        <div id="phase-name">PHASE 1: ANNOYED GLANCE</div>
        <div id="boss-emoji">😠</div>
        
        <div style="font-family: monospace; font-size: 11px; text-align: left; color: #ff0055; font-weight: bold; margin-top: 5px;">BOSS RAGE LEVEL:</div>
        <div class="bar-wrap"><div id="b-bar" class="bar-fill" style="background: #ff0055; width: 100%;"></div></div>
    </div>

    <!-- Active Player Stamina Trackers HUD Layout -->
    <div style="display: flex; justify-content: space-between; font-family: monospace; font-size: 12px; font-weight: bold; color: #fff; margin-bottom: 10px;">
        <div>PLAYER LIFE: <span id="p-hp" style="color:#00ff66;">100/100</span></div>
        <div>SCORE: <span id="score-val" style="color:#ffff00;">0</span></div>
    </div>
    <div class="bar-wrap" style="margin-bottom: 15px; height: 8px;"><div id="p-bar" class="bar-fill" style="background: #00ff66; width: 100%;"></div></div>

    <!-- Whack-A-Mole Combat Matrix Slots Grid Layout -->
    <div class="whack-grid">
        <div class="grid-slot" id="slot-0" onclick="hitTarget(0)"></div>
        <div class="grid-slot" id="slot-1" onclick="hitTarget(1)"></div>
        <div class="grid-slot" id="slot-2" onclick="hitTarget(2)"></div>
        <div class="grid-slot" id="slot-3" onclick="hitTarget(3)"></div>
        <div class="grid-slot" id="slot-4" onclick="hitTarget(4)"></div>
        <div class="grid-slot" id="slot-5" onclick="hitTarget(5)"></div>
        <div class="grid-slot" id="slot-6" onclick="hitTarget(6)"></div>
        <div class="grid-slot" id="slot-7" onclick="hitTarget(7)"></div>
        <div class="grid-slot" id="slot-8" onclick="hitTarget(8)"></div>
    </div>

    <!-- Special Super Ability Skill Trigger Button -->
    <button id="super-btn" class="btn-action" onclick="triggerSuperNuke()" style="margin-bottom: 10px;" disabled>SUPER NUKE CORE: 0% [READY AT 100%]</button>
    <button id="start-btn" class="btn-action" onclick="bootArcadeEngine()" style="background: #00ff66; box-shadow: 0 0 10px #00ff66;">INITIALIZE SYSTEM RUN</button>
</div>

<script>
    let gameActive = false, playerHp = 100, score = 0, currentPhase = 1;
    let bossHp = 1000, maxBossHp = 1000, superCharge = 0;
    let spawnTimer, gameClock, currentActiveSlot = -1;

    // Fixed Angry Face Progression tracking 10 distinct phases of fury
    const bossFuries = {
        1: { text: "Phase 1: Annoyed Glance", face: "😠", color: "#33ff33", delay: 950, damage: 5 },
        2: { text: "Phase 2: Growing Irritation", face: "😠", color: "#00ffff", delay: 850, damage: 7 },
        3: { text: "Phase 3: Bitter Scowl", face: "😡", color: "#00aaff", delay: 800, damage: 10 },
        4: { text: "Phase 4: Flushed Cheeks", face: "😡", color: "#a000ff", delay: 750, damage: 12 },
        5: { text: "Phase 5: Steam Piped", face: "🤬", color: "#ff00ff", delay: 700, damage: 15 },
        6: { name: "Phase 6: Red Hot Temper", face: "🤬", color: "#ff0066", delay: 650, damage: 18 },
        7: { text: "Phase 7: Evil Grin", face: "😈", color: "#ff3300", delay: 600, damage: 22 },
        8: { text: "Phase 8: Uncontained Rage", face: "😈", color: "#ffff00", delay: 550, damage: 25 },
        9: { text: "Phase 9: Oni Demon Rising", face: "👹", color: "#ffffff", delay: 500, damage: 30 },
        10: { text: "Phase 10: Absolute Doomsday Overload", face: "👺", color: "#ff0000", delay: 420, damage: 38 }
    };

    function bootArcadeEngine() {
        playerHp = 100; bossHp = 1000; score = 0; currentPhase = 1; superCharge = 0;
        document.getElementById('start-btn').style.display = "none";
        
        // Clear screen alerts
        const overBox = document.getElementById('game-over-box');
        if (overBox) overBox.remove();
        
        gameActive = true;
        updateViewHUD();
        syncSuperButton();
        
        // Initialize dynamic rhythm speed loops ticking framework pipelines
        gameClock = setInterval(coreTickInterval, 100);
        rotationTimerLoop();
    }

    function rotationTimerLoop() {
        clearInterval(spawnTimer);
        if (!gameActive) return;

        // Damage calculation penalties step if you fail to click a target before it cycles out
        if (currentActiveSlot !== -1) {
            let missedSlot = document.getElementById(`slot-${currentActiveSlot}`);
            if (missedSlot.classList.contains('active-target')) {
                missedSlot.classList.remove('active-target');
                missedSlot.innerText = "";
                decrementPlayerHealth(bossFuries[currentPhase].damage);
            }
        }

        // Random horizontal entry deployment selection index coordinate calculations
        currentActiveSlot = Math.floor(Math.random() * 9);
        let nextTarget = document.getElementById(`slot-${currentActiveSlot}`);
        nextTarget.classList.add('active-target');
        nextTarget.innerText = "💥";

        spawnTimer = setTimeout(rotationTimerLoop, bossFuries[currentPhase].delay);
    }

    function hitTarget(index) {
        if (!gameActive || index !== currentActiveSlot) return;
        
        let targetSlot = document.getElementById(`slot-${index}`);
        if (!targetSlot.classList.contains('active-target')) return;

        // Clear hit node
        targetSlot.classList.remove('active-target');
        targetSlot.innerText = "";
        currentActiveSlot = -1;

        // Apply hit damage metrics to boss health meters
        score += 25;
        bossHp -= 45;
        if (bossHp <= 0) { bossHp = 0; resolveMatchSession(true); return; }

        if (superCharge < 100) {
            superCharge = Math.min(100, superCharge + 10);
            syncSuperButton();
        }

        // Compute phase transitions up to rank tier 10 automatically
        let calculatedPhase = 11 - Math.ceil((bossHp / maxBossHp) * 10);
        if (calculatedPhase > currentPhase && calculatedPhase <= 10) {
            currentPhase = calculatedPhase;
            document.getElementById('boss-emoji').style.transform = "scale(1.3)";
            setTimeout(() => document.getElementById('boss-emoji').style.transform = "scale(1)", 150);
        }

        updateViewHUD();
        rotationTimerLoop(); // Jump straight to next spawn node item cycle immediately
    }

    function triggerSuperNuke() {
        if (superCharge < 100 || !gameActive) return;
        superCharge = 0;
        syncSuperButton();

        // Wipe out immense boss chunks cleanly using your special core skill
        bossHp -= 160;
        score += 50;
        
        // Visual blast effect mapping triggers
        document.getElementById('boss-emoji').style.transform = "rotate(360deg) scale(1.4)";
        setTimeout(() => document.getElementById('boss-emoji').style.transform = "scale(1) rotate(0deg)", 300);

        if (bossHp <= 0) { bossHp = 0; resolveMatchSession(true); return; }

        let calculatedPhase = 11 - Math.ceil((bossHp / maxBossHp) * 10);
        if (calculatedPhase > currentPhase && calculatedPhase <= 10) {
            currentPhase = calculatedPhase;
        }

        updateViewHUD();
    }

    function coreTickInterval() {
        if (!gameActive) return;
        // Small regular passive environment ticks can be wired here if needed
    }

    function decrementPlayerHealth(amt) {
        playerHp -= amt;
        if (playerHp < 0) playerHp = 0;
        updateViewHUD();

        if (playerHp <= 0) resolveMatchSession(false);
    }

    function syncSuperButton() {
        const btn = document.getElementById('super-btn');
        btn.disabled = superCharge < 100;
        if (superCharge >= 100) {
            btn.innerText = "⚡ UNLEASH SUPER NUKE [READY]";
