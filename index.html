<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Drift Arcade</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --cyan-glow: #00f0ff;
            --magenta-glow: #ff007f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            overflow: hidden;
        }

        h1 {
            color: #ffffff;
            margin: 0 0 5px 0;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--cyan-glow);
        }

        p {
            color: #8b949e;
            margin: 0 0 15px 0;
            font-size: 0.9rem;
        }

        #gameBox {
            background-color: var(--container-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        /* Fixed Canvas Element - Completely immune to DOM assembly bugs */
        canvas {
            background-color: #05070a;
            border: 1px solid #21262d;
            border-radius: 6px;
            cursor: none;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .btn-panel {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }

        button {
            background-color: #21262d;
            color: #ffffff;
            border: 1px solid var(--border-color);
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        button:hover {
            background-color: #30363d;
            border-color: var(--cyan-glow);
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
        }

        #musicBtn.audio-on {
            border-color: var(--magenta-glow);
            text-shadow: 0 0 5px var(--magenta-glow);
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }
    </style>
</head>
<body>

    <h1>⚡ Neon Drift</h1>
    <p>Move mouse / swipe finger left and right to dodge high-tech digital grid anomalies!</p>

    <div id="gameBox">
        <!-- Rigid visual frame wrapper -->
        <canvas id="gameCanvas" width="400" height="500"></canvas>
        
        <div class="btn-panel">
            <button id="startBtn">Launch Simulation</button>
            <button id="musicBtn">Audio: OFF</button>
        </div>
    </div>

    <script>
        // High-Tech Canvas Arcade Framework Engine
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const musicBtn = document.getElementById('musicBtn');

        // Game Configuration Variables
        let gameActive = false;
        let score = 0;
        let speedMultiplier = 1;
        let anomalies = [];
        let particles = [];
        
        // Audio Synth Variables
        let audioCtx = null;
        let musicInterval = null;
        let audioEnabled = false;
        let synthStep = 0;

        // Player Core Identity Ship Object Data Structure
        const player = {
            x: 200,
            y: 430,
            width: 30,
            height: 15,
            targetX: 200,
            speed: 0.25
        };

        // Cyberpunk Synth Melody Array Data Nodes (frequencies)
        const bassline = [110, 110, 130, 130, 98, 98, 146, 130];
        const leadArpeggio = [440, 523, 659, 784, 587, 698, 880, 987];

        // Track Pointer Movement Across the Digital Field
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.targetX = e.clientX - rect.left;
        });

        // Add Touch Control Compatibility for Mobile Screens
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            if (e.touches.length > 0) {
                player.targetX = e.touches[0].clientX - rect.left;
            }
        }, { passive: false });

        // Synthesizer Audio Matrix Trigger Loop
        function startSynthAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (musicInterval) clearInterval(musicInterval);

            musicInterval = setInterval(() => {
                if (!audioEnabled || !gameActive) return;

                const now = audioCtx.currentTime;
                
                // 1. Core Heavy Bass Channel Layer
                const bassOsc = audioCtx.createOscillator();
                const bassGain = audioCtx.createGain();
                bassOsc.type = 'sawtooth';
                bassOsc.frequency.setValueAtTime(bassline[synthStep % bassline.length], now);
                bassGain.gain.setValueAtTime(0.15, now);
                bassGain.gain.exponentialRampToValueAtTime(0.01, now + 0.22);
                bassOsc.connect(bassGain);
                bassGain.connect(audioCtx.destination);
                bassOsc.start(now); bassOsc.stop(now + 0.25);

                // 2. High-Tech Lead Melodic Node Layer (Plays on alternating beats)
                if (synthStep % 2 === 0) {
                    const leadOsc = audioCtx.createOscillator();
                    const leadGain = audioCtx.createGain();
                    leadOsc.type = 'triangle';
                    leadOsc.frequency.setValueAtTime(leadArpeggio[(synthStep + 3) % leadArpeggio.length], now);
                    leadGain.gain.setValueAtTime(0.08, now);
                    leadGain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    leadOsc.connect(leadGain);
                    leadGain.connect(audioCtx.destination);
                    leadOsc.start(now); leadOsc.stop(now + 0.18);
                }

                synthStep++;
            }, 200); // Stable 200ms step pacing clock sequencer
        }

        // Trigger Explosion Effects When Crashing
        function crashSFX() {
            if (!audioEnabled || !audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(10, now + 0.5);
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.5);
        }

        // Generate Glowing Vector Sparks Particles
        function spawnExplosion(x, y, color) {
            for(let i=0; i<15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    radius: Math.random() * 3 + 1,
                    alpha: 1,
                    color: color
                });
            }
        }

        // Primary System Engine Core Setup loop Initialization
        function initSimulation() {
            anomalies = [];
            particles = [];
            score = 0;
            speedMultiplier = 1;
            player.x = 200;
            player.targetX = 200;
            gameActive = true;
            startBtn.textContent = "Restart Grid";
            if (audioEnabled) startSynthAudio();
        }

        // Central Animation Loop Engine Frame Hook
        function updateEngineLoop() {
            // Clear view frame layout safely
            ctx.fillStyle = '#05070a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Background High-Tech Vector Grid Lines
            ctx.strokeStyle = '#111622';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let j=0; j<canvas.height; j+=40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
            }

            if (gameActive) {
                // Smooth interpolation for fluid player motion mechanics
                player.x += (player.targetX - player.x) * player.speed;
                
                // Screen boundaries restriction locking clamp
                if (player.x < player.width/2) player.x = player.width/2;
                if (player.x > canvas.width - player.width/2) player.x = canvas.width - player.width/2;

                // Slowly ramp up difficulty speed multiplier factor
                speedMultiplier += 0.0004;

                // Draw Core Player Identity Pointer Ship Model
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00f0ff';
                ctx.fillStyle = '#00f0ff';
                ctx.beginPath();
                ctx.moveTo(player.x, player.y - player.height);
