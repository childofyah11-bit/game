<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mad Face Grid Arena</title>
    <style>
        body { background: #0c0014; color: #ff0055; font-family: 'Arial Black', sans-serif; text-align: center; margin: 0; padding: 15px; user-select: none; }
        .arcade-cabinet { max-width: 400px; margin: 10px auto; background: #1a0033; border: 4px solid #ff0055; box-shadow: 0 0 20px #ff0055; padding: 15px; border-radius: 8px; }
        
        /* The Main Mad Face Monitor Screen */
        .monitor { background: #000; border: 2px solid #00ffff; padding: 10px; margin-bottom: 15px; }
        #boss-expression { font-size: 70px; margin: 5px 0; text-shadow: 0 0 15px #ff0000; transition: transform 0.1s; }
        #phase-title { font-size: 15px; color: #00ffff; font-family: monospace; font-weight: bold; }
        
        /* Health Meter Styling */
        .meter-box { background: #222; width: 100%; height: 16px; border: 1px solid #fff; margin-top: 5px; overflow: hidden; }
        .meter-fill { height: 100%; width: 100%; transition: width 0.15s; }
        
        /* Direct Action Button Grid Layout Matrix Slots */
        .action-matrix { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .grid-button { height: 80px; background: #330066; border: 2px solid #5500aa; border-radius: 6px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .active-strike-zone { background: #ff0055; border-color: #fff; box-shadow: 0 0 15px #ff0055; font-size: 30px; }
        
        .control-btn { background: #00ffff; color: #000; border: 2px solid #fff; padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 0 10px #00ffff; }
        .control-btn:disabled { background: #224444; color: #555; border-color: #333; box-shadow: none; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="arcade-cabinet">
    <!-- Active Shifting Mad Face Monitor Display Header -->
    <div class="monitor">
        <div id="phase-title">PHASE 1: ANNOYED STARE</div>
        <div id="boss-expression">😠</div>
        
        <div style="font-family: monospace; font-size: 11px; text-align: left; color: #ff0055; font-weight: bold; margin-top: 5px;">BOSS LIFE CORE:</div>
        <div class="meter-box"><div id="boss-bar" class="meter-fill" style="background: #ff0055; width: 100%;"></div></div>
    </div>

    <!-- Live HUD Status Trackers Panel -->
    <div style="display: flex; justify-content: space-between; font-family: monospace; font-size: 12px; font-weight: bold; color: #fff; margin-bottom: 10px;">
        <div>PLAYER DATA-LINK: <span id="player-hp-text" style="color:#00ff66;">100/100</span></div>
        <div>SCORE: <span id="score-text" style="color:#ffff00;">0</span></div>
    </div>
    <div class="meter-box" style="margin-bottom: 15px; height: 8px;"><div id="player-bar" class="meter-fill" style="background: #00ff66; width: 100%;"></div></div>

    <!-- Whack-A-Mole Combat Matrix Slots Grid Layout -->
    <div class="action-matrix">
        <button class="grid-button" id="btn-0" onclick="pressGridZone(0)"></button>
        <button class="grid-button" id="btn-1" onclick="pressGridZone(1)"></button>
        <button class="grid-button" id="btn-2" onclick="pressGridZone(2)"></button>
        <button class="grid-button" id="btn-3" onclick="pressGridZone(3)"></button>
        <button class="grid-button" id="btn-4" onclick="pressGridZone(4)"></button>
        <button class="grid-button" id="btn-5" onclick="pressGridZone(5)"></button>
        <button class="grid-button" id="btn-6" onclick="pressGridZone(6)"></button>
        <button class="grid-button" id="btn-7" onclick="pressGridZone(7)"></button>
        <button class="grid-button" id="btn-8" onclick="pressGridZone(8)"></button>
    </div>

    <!-- Special Super Ability Skill Trigger Button Slot -->
    <button id="super-power-btn" class="control-btn" onclick="activateSuperNuke()" style="margin-bottom: 10px;" disabled>SUPER VOLLEY: 0% [READY AT 100%]</button>
    <button id="engine-start-btn" class="control-btn" onclick="bootArcadeProgram()" style="background: #00ff66; box-shadow: 0 0 10px #00ff66;">BOOT ARENA MATCH</button>
</div>

<script>
    let isGameRunning = false, heroHp = 100, currentScore = 0, phaseRank = 1;
    let bossLife = 1000, maxBossLife = 1000, skillCharge = 0;
    let rotationClock, activeTargetId = -1;

    // Configured map tracking 10 distinct phases of increasing facial rage expressions
    const furyLevels = {
        1: { heading: "Phase 1: Annoyed Stare", face: "😠", hue: "#33ff33", timing: 950, attack: 5 },
        2: { heading: "Phase 2: Rising Irritation", face: "😠", hue: "#00ffff", timing: 850, attack: 7 },
        3: { heading: "Phase 3: Deep Scowl", face: "😡", hue: "#00aaff", timing: 800, attack: 10 },
        4: { heading: "Phase 4: Flushed Cheeks", face: "😡", hue: "#a000ff", timing: 750, attack: 12 },
        5: { heading: "Phase 5: Steam Piped", face: "🤬", hue: "#ff00ff", timing: 700, attack: 15 },
        6: { heading: "Phase 6: Red Hot Temper", face: "🤬", hue: "#ff0066", timing: 650, attack: 18 },
        7: { heading: "Phase 7: Evil Glare", face: "😈", hue: "#ff3300", timing: 600, attack: 22 },
        8: { heading: "Phase 8: Uncontained Rage", face: "😈", hue: "#ffff00", timing: 550, attack: 25 },
        9: { heading: "Phase 9: Oni Monster Outbreak", face: "👹", hue: "#ffffff", timing: 500, attack: 30 },
        10: { heading: "Phase 10: Absolute Doomsday Melt", face: "👺", hue: "#ff0000", timing: 420, attack: 38 }
    };

    function bootArcadeProgram() {
        heroHp = 100; bossLife = 1000; currentScore = 0; phaseRank = 1; skillCharge = 0;
        document.getElementById('engine-start-btn').style.display = "none";
        
        const oldPanel = document.getElementById('terminal-end-panel');
        if (oldPanel) oldPanel.remove();
        
        isGameRunning = true;
        refreshScreenHUD();
        syncSpecialMeterButton();
        executeTargetShift();
    }

    function executeTargetShift() {
        clearTimeout(rotationClock);
        if (!isGameRunning) return;

        // Apply a damage penalty if a node cycled out before you clicked it
        if (activeTargetId !== -1) {
            let activeBtn = document.getElementById(`btn-${activeTargetId}`);
            if (activeBtn.classList.contains('active-strike-zone')) {
                activeBtn.classList.remove('active-strike-zone');
                activeBtn.innerText = "";
                penalizePlayerHull(furyLevels[phaseRank].attack);
            }
        }

        // Calculate a random target index to activate
        activeTargetId = Math.floor(Math.random() * 9);
        let freshTarget = document.getElementById(`btn-${activeTargetId}`);
        freshTarget.classList.add('active-strike-zone');
        freshTarget.innerText = "💥";

        rotationClock = setTimeout(executeTargetShift, furyLevels[phaseRank].timing);
    }

    function pressGridZone(index) {
        if (!isGameRunning || index !== activeTargetId) return;
        
        let targetButton = document.getElementById(`btn-${index}`);
        if (!targetButton.classList.contains('active-strike-zone')) return;

        // Reset hit button state
        targetButton.classList.remove('active-strike-zone');
        targetButton.innerText = "";
        activeTargetId = -1;

        currentScore += 25;
        bossLife -= 45;
        if (bossLife <= 0) { bossLife = 0; closeArcadeMatch(true); return; }

        if (skillCharge < 100) {
            skillCharge = Math.min(100, skillCharge + 10);
            syncSpecialMeterButton();
        }

        // Automatic evaluation check for phase updates (10 steps)
        let determinedRank = 11 - Math.ceil((bossLife / maxBossLife) * 10);
        if (determinedRank > phaseRank && determinedRank <= 10) {
            phaseRank = determinedRank;
            document.getElementById('boss-expression').style.transform = "scale(1.25)";
            setTimeout(() => document.getElementById('boss-expression').style.transform = "scale(1)", 120);
        }

        refreshScreenHUD();
        executeTargetShift(); // Shift node position immediately upon successful strike
    }

    function activateSuperNuke() {
        if (skillCharge < 100 || !isGameRunning) return;
        skillCharge = 0;
        syncSpecialMeterButton();

        // High damage strike delivered directly to boss via the special ability
        bossLife -= 150;
        currentScore += 50;
        
        document.getElementById('boss-expression').style.transform = "rotate(180deg) scale(1.35)";
        setTimeout(() => document.getElementById('boss-expression').style.transform = "scale(1) rotate(0deg)", 250);

        if (bossLife <= 0) { bossLife = 0; closeArcadeMatch(true); return; }

        let determinedRank = 11 - Math.ceil((bossLife / maxBossLife) * 10);
        if (determinedRank > phaseRank && determinedRank <= 10) {
            phaseRank = determinedRank;
        }

        refreshScreenHUD();
    }

    function penalizePlayerHull(damageAmount) {
        heroHp -= damageAmount;
        if (heroHp < 0) heroHp = 0;
        refreshScreenHUD();

        if (heroHp <= 0) closeArcadeMatch(false);
    }

    function syncSpecialMeterButton() {
        const btn = document.getElementById('super-power-btn');
        btn.disabled = skillCharge < 100;
        if (skillCharge >= 100) {
            btn.innerText = "⚡ DETONATE SUPER VOLLEY [READY]";
            btn.style.background = "#ff00ff";
            btn.style.color = "#fff";
        } else {
            btn.innerText = `SUPER VOLLEY: ${skillCharge}% [CHARGE AT 100%]`;
            btn.style.background = "#224444";
            btn.style.color = "#555";
        }
    }
