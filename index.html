<style> 
  #game-box { text-align: center; font-family: sans-serif; background: #040407; color: #00ffcc; padding: 15px; } 
  canvas { background: #0d0d1a; border: 2px solid #ff4081; border-radius: 8px; outline: none; } 
  .hud-container { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }
  .p1-hud { color: #00ffcc; font-size: 14px; text-align: left; }
  .p2-hud { color: #ff00ff; font-size: 14px; text-align: right; }
  .score-hud { color: #ffff00; font-size: 16px; width: 100%; text-align: center; position: absolute; }
</style> 

<div id="game-box" style="position: relative;"> 
  <!-- THE CHEAT: Hold SHIFT and click this title 3 times to unlock rapid fire for BOTH ships! --> 
  <h1 id="cheat-btn" style="cursor: pointer; font-size: 22px; margin: 0 0 5px 0; user-select: none;">🌌 Dodger game</h1> 
  
  <div class="hud-container">
    <div id="p1-status" class="p1-hud">P1: ALIVE</div>
    <div id="score" class="score-hud">SCORE: 0</div> 
    <div id="p2-status" class="p2-hud">P2: ALIVE</div>
  </div>

  <canvas id="canvas" width="320" height="400" tabindex="1"></canvas> 
  
  <p style="color: #888; font-size: 11px; margin-top: 5px; line-height: 1.4;">
    <b>Player 1:</b> Left / Right Arrows to Move | Space to Shoot<br>
    <b>Player 2:</b> A / D to Move | W to Shoot<br>
    <span style="color: #ff4081;">If one dies, survive 30 seconds to respawn them!</span>
  </p> 
</div> 

<script> 
const cvs = document.getElementById('canvas'); 
const ctx = cvs.getContext('2d'); 

// Global state variables
let score = 0;
let isOver = false;
let frame = 0;
let asteroids = []; 
let lasers = []; 

// Cheat variables
let clickCount = 0;
let cheatActive = false;

// Player 1 Configuration (Cyan Delta Wing)
let p1 = {
  x: 90,
  y: 350,
  w: 26,
  h: 25,
  alive: true,
  cooldown: 0,
  respawnTimer: 0
};

// Player 2 Configuration (Magenta Square Support Cruiser)
let p2 = {
  x: 200,
  y: 350,
  w: 26,
  h: 25,
  alive: true,
  cooldown: 0,
  respawnTimer: 0
};

// Input state dictionary
const keys = { 
  ArrowLeft: false, ArrowRight: false, Space: false, Shift: false,
  KeyA: false, KeyD: false, KeyW: false 
}; 

window.addEventListener('keydown', (e) => { 
  if (e.key === "Shift") keys.Shift = true; 
  if (e.key === "ArrowLeft") { e.preventDefault(); keys.ArrowLeft = true; } 
  if (e.key === "ArrowRight") { e.preventDefault(); keys.ArrowRight = true; } 
  if (e.key === " ") { e.preventDefault(); keys.Space = true; } 
  
  // Player 2 Controls mapped explicitly via code standard configurations
  if (e.code === "KeyA") keys.KeyA = true;
  if (e.code === "KeyD") keys.KeyD = true;
  if (e.code === "KeyW") keys.KeyW = true;
}); 

window.addEventListener('keyup', (e) => { 
  if (e.key === "Shift") keys.Shift = false; 
  if (e.key === "ArrowLeft") keys.ArrowLeft = false; 
  if (e.key === "ArrowRight") keys.ArrowRight = false; 
  if (e.key === " ") keys.Space = false; 
  
  if (e.code === "KeyA") keys.KeyA = false;
  if (e.code === "KeyD") keys.KeyD = false;
  if (e.code === "KeyW") keys.KeyW = false;
}); 

// EPIC SHIFT + 3-CLICK CHEAT SWITCH 
document.getElementById('cheat-btn').addEventListener('click', () => { 
  if (keys.Shift) { 
    clickCount++; 
    if (clickCount >= 3) { 
      cheatActive = true; 
      document.getElementById('cheat-btn').style.color = '#ffea00'; 
      clickCount = 0; 
      if (isOver) resetGame();
    } 
  } else { 
    clickCount = 0; 
    if (isOver) resetGame(); 
  } 
}); 

function updateHUD() { 
  document.getElementById('score').innerText = `SCORE: ${score}`;
  
  // Manage Player 1 HUD text readout
  if (p1.alive) {
    document.getElementById('p1-status').innerText = "P1: ALIVE";
    document.getElementById('p1-status').style.color = "#00ffcc";
  } else {
    document.getElementById('p1-status').innerText = `P1: DEAD (${Math.ceil(p1.respawnTimer / 60)}s)`;
    document.getElementById('p1-status').style.color = "#ff4081";
  }

  // Manage Player 2 HUD text readout
  if (p2.alive) {
    document.getElementById('p2-status').innerText = "P2: ALIVE";
    document.getElementById('p2-status').style.color = "#ff00ff";
  } else {
    document.getElementById('p2-status').innerText = `P2: DEAD (${Math.ceil(p2.respawnTimer / 60)}s)`;
    document.getElementById('p2-status').style.color = "#ff4081";
  }
} 

function resetGame() { 
  score = 0; 
  isOver = false; 
  frame = 0; 
  asteroids = []; 
  lasers = []; 
  cheatActive = false;
  document.getElementById('cheat-btn').style.color = '#00ffcc';

  // Re-initialize Player 1 states
  p1.x = 90;
  p1.alive = true;
  p1.cooldown = 0;
  p1.respawnTimer = 0;

  // Re-initialize Player 2 states
  p2.x = 200;
  p2.alive = true;
  p2.cooldown = 0;
  p2.respawnTimer = 0;

  updateHUD(); 
  loop(); 
} 

function loop() { 
  if (isOver) { 
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; 
    ctx.fillRect(0, 0, 320, 400); 
    ctx.fillStyle = '#ff4081'; 
    ctx.font = 'bold 20px sans-serif'; 
    ctx.textAlign = 'center'; 
    ctx.fillText('💥 BOTH SHIPS CRASHED 💥', 160, 180); 
    ctx.font = '13px sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('Click the Title to Restart', 160, 220);
    return; 
  } 

  ctx.clearRect(0, 0, 320, 400); 
  frame++; 

  // --- PLAYER 1 ENGINE (Arrow Keys) ---
  if (p1.alive) {
    if (keys.ArrowLeft && p1.x > 0) p1.x -= 4.5; 
    if (keys.ArrowRight && p1.x < 294) p1.x += 4.5; 
    if (p1.cooldown > 0) p1.cooldown--; 

    if (keys.Space && p1.cooldown === 0) { 
      lasers.push({ x: p1.x + 11, y: p1.y, color: '#00ffcc' }); 
      p1.cooldown = cheatActive ? 3 : 15; 
    } 

    // Draw Player 1 Triangle Fighter (Cyan Jet)
    ctx.fillStyle = '#00ffcc'; 
    ctx.beginPath(); 
    ctx.moveTo(p1.x + 13, p1.y); 
    ctx.lineTo(p1.x + 26, p1.y + p1.h); 
    ctx.lineTo(p1.x, p1.y + p1.h); 
    ctx.closePath(); 
    ctx.fill(); 
  } else {
    // Process Respawn Logic Countdowns
    p1.respawnTimer--;
    if (p1.respawnTimer <= 0) {
      p1.alive = true;
      p1.x = 145; // Respawn safely in middle
    }
  }

  // --- PLAYER 2 ENGINE (A / D / W Keys) ---
  if (p2.alive) {
    if (keys.KeyA && p2.x > 0) p2.x -= 4.5; 
    if (keys.KeyD && p2.x < 294) p2.x += 4.5; 
    if (p2.cooldown > 0) p2.cooldown--; 

    if (keys.KeyW && p2.cooldown === 0) { 
      // Support ship shoots wider defensive projectiles
      lasers.push({ x: p2.x + 11, y: p2.y, color: '#ff00ff' }); 
      p2.cooldown = cheatActive ? 3 : 15; 
    } 

    // Draw Player 2 Block Support Cruiser (Magenta Armor Ship)
    ctx.fillStyle = '#ff00ff'; 
    ctx.fillRect(p2.x, p2.y + 8, p2.w, p2.h - 8);
    ctx.fillRect(p2.x + 8, p2.y, 10, 8); // Top gun node tower
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(p2.x + 4, p2.y + 12, 4, 4); // Cool cockpit lights
    ctx.fillRect(p2.x + 18, p2.y + 12, 4, 4);
  } else {
    p2.respawnTimer--;
    if (p2.respawnTimer <= 0) {
      p2.alive = true;
      p2.x = 145;
    }
  }

  // Double Defeat Game State Safety Check
  if (!p1.alive && !p2.alive) {
    isOver = true;
  }

  // --- HARM OBJECTS SPAWNER (Asteroids) ---
  // Speed escalates progressively alongside current total game scores
  if (frame % Math.max(15, 40 - Math.floor(score / 50)) === 0) { 
    asteroids.push({ 
      x: Math.random() * 290, 
      y: -20, 
      size: Math.random() * 15 + 15, 
      speed: Math.random() * 2 + 1.8 + (score / 300)
    }); 
  } 

  // --- LASERS ENGINE LOOP ---
  for (let i = lasers.length - 1; i >= 0; i--) { 
    let l = lasers[i]; 
    l.y -= 7.5; 

    ctx.fillStyle = l.color;
    ctx.fillRect(l.x, l.y, 4, 10); 

    for (let j = asteroids.length - 1; j >= 0; j--) { 
      let a = asteroids[j]; 
      if (l.x < a.x + a.size && l.x + 4 > a.x && l.y < a.y + a.size && l.y + 10 > a.y) { 
        lasers.splice(i, 1); 
        asteroids.splice(j, 1); 
        score += 10; 
        break; 
      } 
    } 
    if (l && l.y < -20) lasers.splice(i, 1); 
  } 

  // --- ASTEROIDS PHYSICS MATRIX ENGINE ---
  for (let b = asteroids.length - 1; b >= 0; b--) { 
    let ast = asteroids[b]; 
    ast.y += ast.speed; 

    ctx.fillStyle = '#ff9900'; 
    ctx.fillRect(ast.x, ast.y, ast.size, ast.size); 

    // Handle Player 1 Collision Boundary Tests
    if (p1.alive && p1.x < ast.x + ast.size && p1.x + p1.w > ast.x && p1.y < ast.y + ast.size && p1.y + p1.h > ast.y) { 
      p1.alive = false;
      p1.respawnTimer = 1800; // 1800 frames = exactly 30 seconds at 60 FPS
      asteroids.splice(b, 1);
      continue; 
    } 

    // Handle Player 2 Collision Boundary Tests
    if (p2.alive && p2.x < ast.x + ast.size && p2.x + p2.w > ast.x && p2.y < ast.y + ast.size && p2.y + p2.h > ast.y) { 
      p2.alive = false;
      p2.respawnTimer = 1800; 
      asteroids.splice(b, 1);
      continue; 
    } 

    if (ast.y > 420) asteroids.splice(b, 1); 
  } 

  // Track ticking data output onto UI elements live
  updateHUD(); 

  requestAnimationFrame(loop); 
} 

// Start initialization routines
loop(); 
</script>
