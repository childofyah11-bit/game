<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Cyberband Neo Pro</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --border-color: #30363d;
            --accent-active: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.4);
            --text-main: #c9d1d9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 5px;
            font-size: 2.2rem;
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
        }

        p {
            color: #8b949e;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        .sequencer-container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.6);
            max-width: 900px;
            width: 100%;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            align-items: center;
            flex-wrap: wrap;
            background-color: #0d1117;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        button {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }

        button.playing {
            background-color: #238636;
            color: #ffffff;
            border-color: #2ea44f;
            box-shadow: 0 0 12px rgba(46, 164, 79, 0.5);
        }

        .bpm-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: #8b949e;
        }

        input[type="range"] {
            cursor: pointer;
            accent-color: var(--accent-active);
        }

        .grid {
            display: grid;
            grid-template-columns: 100px repeat(16, 1fr);
            gap: 6px;
            overflow-x: auto;
        }

        .row-label {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pad {
            aspect-ratio: 1;
            background-color: #21262d;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.1s, box-shadow 0.1s;
            min-width: 25px;
        }

        .pad:hover {
            background-color: #30363d;
        }

        .pad.active {
            background-color: var(--accent-active);
            border-color: #79c0ff;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* Color variations for specific instrument groupings */
        .grid div[data-row="0"].active, .grid div[data-row="1"].active { background-color: #ff7b72; border-color: #ffa198; box-shadow: 0 0 10px rgba(255,123,114,0.4); }
        .grid div[data-row="2"].active, .grid div[data-row="3"].active { background-color: #79c0ff; border-color: #c9d1d9; box-shadow: 0 0 10px rgba(121,192,255,0.4); }
        .grid div[data-row="4"].active, .grid div[data-row="5"].active { background-color: #d2a8ff; border-color: #e8d5ff; box-shadow: 0 0 10px rgba(210,168,255,0.4); }
        .grid div[data-row="6"].active, .grid div[data-row="7"].active { background-color: #3fb950; border-color: #56d364; box-shadow: 0 0 10px rgba(63,185,80,0.4); }

        .pad.current-step {
            outline: 2px solid #ffffff;
            outline-offset: 1px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>🚀 Cyberband Neo Pro</h1>
    <p>Build a production-grade live loop track right from your GitHub dashboard!</p>

    <div class="sequencer-container">
        <div class="controls">
            <button id="playBtn">START BEAT</button>
            <button id="clearBtn">CLEAR ALL</button>
            <div class="bpm-container">
                <span>SPEED:</span>
                <input type="range" id="bpmSlider" min="60" max="200" value="120">
                <span id="bpmVal">120 BPM</span>
            </div>
        </div>

        <div class="grid" id="sequencerGrid">
            <!-- Labels and pads will be generated via JavaScript -->
        </div>
    </div>

    <script>
        // Expanded to 8 dynamic instrument sound options
        const tracks = ['Heavy Kick', 'Deep Snare', 'Open Hat', 'Closed Hat', 'Synth Low', 'Synth Mid', 'Synth High', 'Laser SFX'];
        // Expanded grid width from 8 steps up to 16 steps
        const steps = 16; 
        
        let isPlaying = false;
        let currentStep = 0;
        let intervalId = null;
        let audioCtx = null;
        let bpm = 120;

        const grid = document.getElementById('sequencerGrid');
        const playBtn = document.getElementById('playBtn');
        const clearBtn = document.getElementById('clearBtn');
        const bpmSlider = document.getElementById('bpmSlider');
        const bpmVal = document.getElementById('bpmVal');

        const gridState = tracks.map(() => Array(steps).fill(false));

        // Generate 16-step massive layout grid interface
        tracks.forEach((trackName, rowIndex) => {
            const label = document.createElement('div');
            label.className = 'row-label';
            label.textContent = trackName;
            grid.appendChild(label);

            for (let colIndex = 0; colIndex < steps; colIndex++) {
                const pad = document.createElement('div');
                pad.className = 'pad';
                pad.dataset.row = rowIndex;
                pad.dataset.col = colIndex;

                pad.addEventListener('click', () => {
                    gridState[rowIndex][colIndex] = !gridState[rowIndex][colIndex];
                    pad.classList.toggle('active');
                });

                grid.appendChild(pad);
            }
        });

        // Synthetic Sound Engine - Generating 8 customized instrument layers
        function playSound(trackIndex) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            switch(trackIndex) {
                case 0: // Heavy Kick
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.4);
                    gain.gain.setValueAtTime(1.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                    break;
                case 1: // Deep Snare
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(220, now);
                    osc.frequency.exponentialRampToValueAtTime(80, now + 0.25);
                    gain.gain.setValueAtTime(0.8, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now); osc.stop(now + 0.25);
                    break;
                case 2: // Open Hat
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(9000, now);
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                    break;
                case 3: // Closed Hat
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(11000, now);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.06);
                    osc.start(now); osc.stop(now + 0.06);
                    break;
                case 4: // Synth Low (Bassline note)
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(110, now); // A2 pitch frequency node
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                    osc.start(now); osc.stop(now + 0.35);
                    break;
                case 5: // Synth Mid
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(329.63, now); // E4 pitch frequency node
                    gain.gain.setValueAtTime(0.35, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                    osc.start(now); osc.stop(now + 0.35);
                    break;
                case 6: // Synth High (Melodic top layer)
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now); // C5 pitch frequency node
                    gain.gain.setValueAtTime(0.35, now);
