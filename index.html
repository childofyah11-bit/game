<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dodger — Cosmic Rescue</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#04040a;
      --panel:#0f1222;
      --accent:#ff4081;
      --accent2:#00e6b8;
      --muted:#9aa3b2;
      --gold:#ffd700;
    }
    html,body{height:100%;margin:0;background:linear-gradient(180deg,#02020a 0%, #05051a 60%, #071026 100%);font-family: 'Orbitron', sans-serif;color:var(--accent2);-webkit-font-smoothing:antialiased;}
    #game-box{
      width:100%;max-width:860px;margin:18px auto;padding:18px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.06));box-shadow:0 6px 30px rgba(1,1,6,0.6);text-align:center;
    }
    header{display:flex;align-items:center;justify-content:space-between;gap:12px}
    h1#title{cursor:pointer;margin:0;color:var(--accent2);font-size:22px;display:flex;align-items:center;gap:8px}
    h1#title .logo{font-size:20px;filter:drop-shadow(0 0 8px rgba(0,255,200,.08))}
    .hud {display:flex;justify-content:space-between;align-items:center;margin-top:8px}
    .hud .left,.hud .center,.hud .right{flex:1}
    .hud .center{text-align:center;font-size:14px;color:var(--gold);font-weight:700}
    .hud .left{font-size:13px;color:var(--accent2)}
    .hud .right{font-size:13px;color:#ff7bd6;text-align:right}
    canvas{display:block;margin:12px auto;border-radius:10px;background:transparent;box-shadow:0 6px 18px rgba(0,0,0,0.6);outline:none;border:2px solid rgba(255,64,129,0.08)}
    .sub{color:var(--muted);font-size:12px;margin-top:6px}
    /* overlays and screens */
    .overlay{position:absolute;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .panel{pointer-events:auto;background:linear-gradient(180deg, rgba(10,12,20,.95), rgba(6,8,12,.85));padding:18px;border-radius:12px;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.8);min-width:260px}
    .panel h2{margin:0 0 8px 0;font-size:20px;color:var(--accent)}
    .btn{background:linear-gradient(90deg,var(--accent),#ffea00);border:none;padding:10px 16px;border-radius:8px;font-weight:700;color:#05060a;cursor:pointer;margin-top:8px}
    .small{font-size:12px;color:var(--muted);margin-top:6px}
    /* touch controls */
    .controls{display:none;position:relative;margin-top:10px}
    @media (max-width:700px){
      canvas{width:92vw;height:92vw;max-height:92vh}
      .controls{display:flex;justify-content:space-between;gap:8px}
      .touch-btn{flex:1;padding:12px;border-radius:10px;background:rgba(255,255,255,0.03);color:var(--muted);font-weight:700}
    }
    /* floating text */
    .floating{position:absolute;pointer-events:none;transform:translate(-50%,-50%);white-space:nowrap}
    /* leaderboard */
    .leader{text-align:left;margin-top:8px}
    .toggle{background:transparent;border:1px dashed rgba(255,255,255,0.06);padding:8px;border-radius:8px;color:var(--muted);cursor:pointer}
  </style>
</head>
<body>
  <div id="game-box">
    <header>
      <h1 id="title"><span class="logo">🌌</span> Cosmic Dodger</h1>
      <div style="text-align:right">
        <div style="font-size:12px;color:var(--muted)">Left / Right • Space to Shoot</div>
        <div style="font-size:11px;color:var(--muted);margin-top:6px">Tip: Hold Shift + Click Title for cheat drone</div>
      </div>
    </header>

    <div class="hud">
      <div class="left" id="player-hud">PLAYER: READY</div>
      <div class="center" id="score-hud">SCORE: 0  ×1</div>
      <div class="right" id="ai-hud">AI: ONLINE</div>
    </div>

    <div style="position:relative">
      <canvas id="canvas" width="700" height="700" tabindex="1"></canvas>
      <div id="overlay" class="overlay" style="display:none"><div class="panel" id="panel"></div></div>
    </div>

    <div class="sub">Collect power-ups, chain combos, and defeat bosses. Mobile controls shown on small screens.</div>

    <div class="controls" id="touch-controls">
      <button class="touch-btn" id="btn-left">◀</button>
      <button class="touch-btn" id="btn-fire">●</button>
      <button class="touch-btn" id="btn-right">▶</button>
    </div>
  </div>

  <script>
  // Canvas setup
  const cvs = document.getElementById('canvas');
  const ctx = cvs.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  function resizeCanvas(){
    const rect = cvs.getBoundingClientRect();
    const ratio = window.devicePixelRatio || 1;
    cvs.width = Math.min(1000, Math.max(640, Math.floor(Math.min(window.innerWidth*0.92, 780)))) * ratio;
    cvs.height = cvs.width;
    ctx.setTransform(ratio,0,0,ratio,0,0);
  }

  // Audio: simple WebAudio SFX + ambient loop
  let audioCtx, masterGain;
  function ensureAudio(){
    if (!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain(); masterGain.gain.value = 0.06; masterGain.connect(audioCtx.destination);
      // ambient background (very subtle)
      const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
      o.type='sine'; o.frequency.value = 40; g.gain.value = 0.002; o.connect(g); g.connect(masterGain); o.start();
    }
  }
  function sfx(type, pitch=1, when=0){
    ensureAudio();
    const t = audioCtx.currentTime + when;
    if (type === 'shoot'){
      const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(700 * pitch, t);
      g.gain.setValueAtTime(0.0001, t); g.gain.exponentialRampToValueAtTime(0.08, t+0.01); g.gain.exponentialRampToValueAtTime(0.0001, t+0.14);
      o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.16);
    } else if (type === 'hit'){
      const b = audioCtx.createOscillator(); const g = audioCtx.createGain();
      b.type='triangle'; b.frequency.setValueAtTime(200*pitch, t); g.gain.setValueAtTime(0.05, t); g.gain.exponentialRampToValueAtTime(0.0001, t+0.22);
      b.connect(g); g.connect(masterGain); b.start(t); b.stop(t+0.22);
    } else if (type === 'pickup'){
      const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(1100, t); g.gain.value=0.06; o.connect(g); g.connect(masterGain); o.start(t); o.frequency.exponentialRampToValueAtTime(1600, t+0.08); o.stop(t+0.18);
    } else if (type === 'explode'){
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate*0.18, audioCtx.sampleRate); const data = buffer.getChannelData(0);
      for (let i=0;i<data.length;i++){ data[i] = (Math.random()*2-1) * (1 - i/data.length) * Math.random(); }
      const src = audioCtx.createBufferSource(); const g = audioCtx.createGain(); src.buffer = buffer; g.gain.value=0.12; src.connect(g); g.connect(masterGain); src.start(t);
    }
  }

  // Game state
  let score = 0, multiplier = 1, comboTimer = 0, frame = 0, isOver = true, running = false;
  let asteroids = [], enemies = [], lasers = [], enemyBullets = [], bossLasers = [], pickups = [], particles = [];
  let activeBoss = null, bossStage = 0, wave = 0;
  let cheatActive = false, clickCount = 0, chaosMode = false;
  const keys = { left:false, right:false, fire:false, shift:false };

  // Player & allies
  const player = { x: 360, y: 620, w:28, h:24, speed:7.2, cooldown:0, rate:10, health:1, lives:3, shield:0, shieldTimer:0, invul:0 };
  const aiAlpha = { x: 160, y: 620, w:24, h:20, speed:4.8, cooldown:0, alive:true, respawn:0 };
  const aiBeta = { x: 560, y: 620, w:24, h:20, speed:5.6, cooldown:0, alive:false, respawn:0 };
  const aiGamma = { x: 360, y: 620, w:20, h:18, speed:6, cooldown:0, alive:false, respawn:0 };

  // Leaderboard (localStorage)
  function loadHighScores(){
    try{ return JSON.parse(localStorage.getItem('dodger_highscores')||'[]'); }catch(e){return []}
  }
  function saveHighScores(arr){ localStorage.setItem('dodger_highscores', JSON.stringify(arr.slice(0,10))); }
  function pushScore(name, sc){ const list = loadHighScores(); list.push({name:name||'---',score:sc,date:Date.now()}); list.sort((a,b)=>b.score-a.score); saveHighScores(list); }

  // UI
  const overlay = document.getElementById('overlay');
  const panel = document.getElementById('panel');
  const title = document.getElementById('title');
  const scoreHud = document.getElementById('score-hud');
  const playerHud = document.getElementById('player-hud');
  const aiHud = document.getElementById('ai-hud');

  // Touch controls
  const btnLeft = document.getElementById('btn-left');
  const btnRight = document.getElementById('btn-right');
  const btnFire = document.getElementById('btn-fire');
  if (btnLeft){btnLeft.addEventListener('touchstart', ()=>keys.left=true); btnLeft.addEventListener('touchend', ()=>keys.left=false);}
  if (btnRight){btnRight.addEventListener('touchstart', ()=>keys.right=true); btnRight.addEventListener('touchend', ()=>keys.right=false);}
  if (btnFire){btnFire.addEventListener('touchstart', ()=>keys.fire=true); btnFire.addEventListener('touchend', ()=>keys.fire=false);}

  // input
  window.addEventListener('keydown', (e)=>{
    if (e.key==='ArrowLeft') { e.preventDefault(); keys.left=true; }
    if (e.key==='ArrowRight') { e.preventDefault(); keys.right=true; }
    if (e.key===' ') { e.preventDefault(); keys.fire=true; }
    if (e.key==='Shift') keys.shift=true;
  });
  window.addEventListener('keyup', (e)=>{
    if (e.key==='ArrowLeft') keys.left=false;
    if (e.key==='ArrowRight') keys.right=false;
    if (e.key===' ') keys.fire=false;
    if (e.key==='Shift') keys.shift=false;
  });

  // title cheat and start
  title.addEventListener('click', (e)=>{
    if (keys.shift){
      clickCount++;
      if (clickCount>=3){ activateCheat(); clickCount=0; }
    } else {
      clickCount = 0;
      if (isOver) startGame();
    }
  });

  function activateCheat(){
    cheatActive = true; aiBeta.alive = true; aiGamma.alive = true; aiBeta.x = player.x + 40; aiGamma.x = player.x - 40;
    score += 250; showFloating('CHEAT UNLOCKED!', player.x, player.y - 40, '#ffea00');
    title.style.color = '#ffea00'; sfx('pickup');
    if (isOver) startGame();
  }

  // spawn helpers
  function spawnAsteroid(){
    asteroids.push({
      x: Math.random()* (cvs.width/ (window.devicePixelRatio||1) - 40),
      y: -30 - Math.random()*80,
      size: 18 + Math.random()*46,
      speed: (chaosMode?2.4:1.8) + Math.random()*2.4 + (score/900),
      rot: Math.random()*Math.PI*2,
      spin: (Math.random()*0.08)-0.04
    });
  }
  function spawnEnemy(){
    enemies.push({
      x: Math.random()*(cvs.width/(window.devicePixelRatio||1)-36),
      y: -20,
      size: 18,
      hp: chaosMode?3:2 + Math.floor(Math.random()*2),
      speed: (chaosMode?3.2:2.2) + Math.random()*1.8,
      cooldown: 40 + Math.floor(Math.random()*80),
      type: Math.random()>0.85 ? 'shooter' : 'fighter'
    });
  }

  // powerups: rapid, shield, spread, bomb, score
  function spawnPickup(x,y){
    const types = ['rapid','shield','spread','bomb','score'];
    const t = types[Math.floor(Math.random()*types.length)];
    pickups.push({ x, y, type: t, vy:1.2, t:t });
  }

  // particles
  function spawnParticles(x,y,color,count=18,spread=2){
    for (let i=0;i<count;i++){
      const a = Math.random()*Math.PI*2;
      const s = Math.random()*spread + 0.6;
      particles.push({
        x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30 + Math.floor(Math.random()*40),
        color:color, size:1 + Math.random()*3, fade:true
      });
    }
  }

  // floating text
  const floats = [];
  function showFloating(txt, x, y, color='#fff'){
    floats.push({txt,x,y,color,alpha:1,life:90});
  }

  // collision helpers
  function rectHit(aX,aY,aW,aH,bX,bY,bW,bH){
    return aX < bX + bW && aX + aW > bX && aY < bY + bH && aY + aH > bY;
  }

  // Update HUD
  function updateHUD(){
    scoreHud.innerText = `SCORE: ${score}  ×${Math.floor(multiplier*100)/100}`;
    playerHud.innerText = `LIVES: ${player.lives}  HP: ${player.health} ${player.shield>0? '• SHIELD':' '}`;
    aiHud.innerText = chaosMode ? `CHAOS MODE` : (cheatActive ? `AI SQUAD: ${ (aiAlpha.alive?1:0)+(aiBeta.alive?1:0)+(aiGamma.alive?1:0) }/3` : (aiAlpha.alive? 'AI: ALPHA' : 'AI: REBUILDING'));
  }

  // Game start/reset
  function startGame(){
    ensureAudio();
    score = 0; multiplier = 1; comboTimer = 0; frame = 0; isOver = false; running=true;
    asteroids=[]; enemies=[]; lasers=[]; enemyBullets=[]; bossLasers=[]; pickups=[]; particles=[]; floats.length=0;
    activeBoss = null; bossStage = 0; wave = 0; player.health = 1; player.lives = 3; player.shield=0; player.shieldTimer=0; player.invul=60;
    aiAlpha.alive = true; aiBeta.alive = cheatActive; aiGamma.alive = cheatActive;
    overlay.style.display = 'none';
    sfx('pickup');
    requestAnimationFrame(loop);
  }

  function respawnPlayer(){
    player.x = (cvs.width/(window.devicePixelRatio||1))/2 - player.w/2; player.y = (cvs.height/(window.devicePixelRatio||1)) - 80; player.cooldown=0; player.invul = 100; player.shieldTimer = Math.max(0, player.shieldTimer-20);
  }

  function endGame(){
    isOver = true; running=false;
    overlay.style.display = 'flex';
    const hs = loadHighScores();
    panel.innerHTML = `<h2>💥 MISSION FAILED 💥</h2>
    <div>Final Score: <strong>${score}</strong></div>
    <div style="margin-top:8px"><input id=initials placeholder="Your initials" maxlength=3 style='font-weight:700;padding:6px;border-radius:6px;border:none;margin-right:8px;text-transform:uppercase'/> <button class="btn" id="saveScore">Save Score</button></div>
    <div style="margin-top:8px"><button class="btn" id="restart">Restart</button></div>
    <div class="small">Tip: chain kills quickly to increase your combo multiplier.</div>
    <div class="leader">Top Scores:<ol id='leaders'>${hs.slice(0,5).map(s=>`<li>${s.name} — ${s.score}</li>`).join('')}</ol></div>`;
    document.getElementById('restart').addEventListener('click', ()=>{ overlay.style.display='none'; startGame(); });
    document.getElementById('saveScore').addEventListener('click', ()=>{ const i = document.getElementById('initials').value.trim().toUpperCase().slice(0,3) || '---'; pushScore(i, score); document.getElementById('saveScore').innerText='Saved'; });
    sfx('explode'); showFloating('MISSION FAILED', 350, 350, '#ff5a7a');
  }

  // Chaos toggle button in menu
  function showMenu(){
    overlay.style.display = 'flex';
    const leaders = loadHighScores();
    panel.innerHTML = `<h2>COSMIC DODGER</h2>
      <div>Pilot the rescue ship. Avoid asteroids, destroy enemies, collect power-ups and take down bosses.</div>
      <div style="margin-top:8px">Controls: ← / → and Space. On mobile, use on-screen buttons.</div>
      <div style="margin-top:12px"><button class="btn" id="play">Play</button> <button class="btn" id="playChaos" style='background:linear-gradient(90deg,#ff6a6a,#ffea00);margin-left:8px'>Play Chaos</button></div>
      <div style="margin-top:8px" class="small">Tip: Chain kills quickly to increase your combo multiplier!</div>
      <div class='leader'><strong>Top Scores</strong><ol id='leaders'>${leaders.slice(0,6).map(s=>`<li>${s.name} — ${s.score}</li>`).join('')}</ol></div>
      <div style='margin-top:8px'><button class='toggle' id='clearScores'>Clear Scores</button></div>`;
    document.getElementById('play').addEventListener('click', ()=>{ chaosMode=false; overlay.style.display='none'; startGame(); });
    document.getElementById('playChaos').addEventListener('click', ()=>{ chaosMode=true; overlay.style.display='none'; startGame(); });
    document.getElementById('clearScores').addEventListener('click', ()=>{ localStorage.removeItem('dodger_highscores'); showMenu(); });
  }

  // Boss spawn logic
  function maybeSpawnBoss(){
    if (!activeBoss){
      if (score > (chaosMode?600:250) && bossStage === 0){ bossStage=1; spawnBoss(1); }
      else if (score > (chaosMode?2000:800) && bossStage === 1){ bossStage=2; spawnBoss(2); }
      else if (score > (chaosMode?5000:2000) && bossStage === 2){ bossStage=3; spawnBoss(3); }
    }
  }
  function spawnBoss(type){
    if (type===1) activeBoss = { name:'VANGUARD', x:120, y:-120, w:160, h:46, hp:120, maxHp:120, cooldown:60, speed:1.8, dir:1, type:1, targetY:60 };
    if (type===2) activeBoss = { name:'VOID LEVIATHAN', x:100, y:-160, w:220, h:56, hp:260, maxHp:260, cooldown:50, speed:2.2, dir:1, type:2, targetY:70 };
    if (type===3) activeBoss = { name:'PHANTOM NEXUS', x:80, y:-200, w:260, h:74, hp:500, maxHp:500, cooldown:80, speed:2.0, dir:1, type:3, spawnMinions:0, targetY:80 };
    showFloating(activeBoss.name, activeBoss.x + activeBoss.w/2, activeBoss.y + 40, '#00bfff'); sfx('hit',1.2);
  }

  // Game loop
  function loop(){
    if (!running) return;
    frame++;
    drawBackground();

    // spawn pacing
    const astRate = Math.max(6, (chaosMode?6:28) - Math.floor(score / (chaosMode?200:400)));
    const ftrRate = Math.max(90, (chaosMode?120:180) - Math.floor(score / (chaosMode?12:30)));
    if (frame % astRate === 0) spawnAsteroid();
    if (frame % ftrRate === 0) spawnEnemy();
    if (frame % 600 === 0 && Math.random() > 0.4) spawnPickup(Math.random()*(cvs.width/ (window.devicePixelRatio||1)-40), -10);

    maybeSpawnBoss();

    // player controls
    if (player.cooldown>0) player.cooldown--;
    if (keys.left && player.x > 4) player.x -= player.speed;
    if (keys.right && player.x < (cvs.width/(window.devicePixelRatio||1)- player.w -4)) player.x += player.speed;
    if (keys.fire && player.cooldown<=0 && player.invul<=0){
      shotFrom(player.x + player.w/2, player.y, '#00e6b8', 1, true);
      sfx('shoot', 1);
      player.cooldown = player.rate * (player.shield>0?0.7:1) / (player.rapid?0.6:1);
    }

    // draw player
    drawPlayer(player);

    // allies behavior
    aiTick(aiAlpha, 1);
    if (aiBeta.alive) aiTick(aiBeta, 0.9, true);
    if (aiGamma.alive) aiTick(aiGamma, 0.85, false, true);

    // lasers
    for (let i=lasers.length-1;i>=0;i--){
      const l = lasers[i]; l.y -= l.vy; ctx.fillStyle = l.color; ctx.fillRect(l.x-2, l.y-12, 4, 12);
      // hit enemies
      for (let j=enemies.length-1;j>=0;j--){
        if (rectHit(l.x-4, l.y-12, 8,12, enemies[j].x, enemies[j].y, enemies[j].size, enemies[j].size)){
          enemies[j].hp -= l.dmg; spawnParticles(l.x, l.y, '#ffcc66', 8, 2);
          lasers.splice(i,1); sfx('hit', 1.2);
          if (enemies[j].hp <= 0){ score += 20 * multiplier; comboTimer = 120; multiplier = Math.min(12, multiplier + 0.5); showFloating('+20', enemies[j].x+10,enemies[j].y, '#ffd700'); spawnParticles(enemies[j].x+8,enemies[j].y+8,'#bbff66',20,3); enemies.splice(j,1); }
          break;
        }
      }
      // hit asteroid
      for (let j=asteroids.length-1;j>=0;j--){
        if (rectHit(l.x-4, l.y-12, 8,12, asteroids[j].x, asteroids[j].y, asteroids[j].size, asteroids[j].size)){
          score += 8 * multiplier; comboTimer = 90; multiplier = Math.min(12, multiplier + 0.2);
          spawnParticles(l.x, l.y, '#ff9933', 10, 3);
          asteroids.splice(j,1);
          lasers.splice(i,1);
          sfx('hit', 0.9);
          break;
        }
      }
      // hit boss
      if (activeBoss && rectHit(l.x-4, l.y-12, 8,12, activeBoss.x, activeBoss.y, activeBoss.w, activeBoss.h)){
        activeBoss.hp -= l.dmg * (cheatActive?1.4:1);
        spawnParticles(l.x, l.y, '#00bfff', 12, 3);
        lasers.splice(i,1); sfx('hit', 1.4);
        if (activeBoss.hp <= 0){ score += activeBoss.maxHp * 2; showFloating('BOSS DOWN!', activeBoss.x + activeBoss.w/2, activeBoss.y + 20, '#00ffcc'); for (let p=0;p<4;p++) spawnPickup(activeBoss.x + Math.random()*activeBoss.w, activeBoss.y+ activeBoss.h); activeBoss = null; }
      }
      if (l.y < -30) lasers.splice(i,1);
    }

    // enemy bullets
    for (let i=enemyBullets.length-1;i>=0;i--){
      const b = enemyBullets[i]; b.x += b.vx; b.y += b.vy; ctx.fillStyle = b.color; ctx.fillRect(b.x-3, b.y-6, 6, 12);
      if (player.invul>0) { if (rectHit(b.x-3,b.y-6,6,12, player.x, player.y, player.w, player.h)) { enemyBullets.splice(i,1); spawnParticles(player.x+12, player.y+8, '#88ddff', 6,1); } }
      else if (!player.shield && rectHit(b.x-3,b.y-6,6,12, player.x, player.y, player.w, player.h)){
        enemyBullets.splice(i,1); sfx('explode'); if (!cheatActive){ player.health--; spawnParticles(player.x+10, player.y+8, '#ff5577', 30, 3); if (player.health<=0){ player.lives--; if (player.lives>0){ respawnPlayer(); } else endGame(); } } else { score += 6; }
        continue;
      } else if (player.shield && rectHit(b.x-3,b.y-6,6,12, player.x, player.y, player.w, player.h)){
        enemyBullets.splice(i,1); player.shieldTimer -= 20; sfx('hit',0.8); spawnParticles(player.x+12, player.y+6, '#88ddff', 8, 1); continue;
      }
      if (b.y > cvs.height/(window.devicePixelRatio||1)+40) enemyBullets.splice(i,1);
    }

    // enemies movement & fire
    for (let i=enemies.length-1;i>=0;i--){
      const e = enemies[i]; e.y += e.speed; ctx.fillStyle = '#bbff66'; ctx.fillRect(e.x, e.y, e.size, e.size);
      if (e.cooldown>0) e.cooldown--; else { enemyBullets.push({x:e.x + e.size/2, y:e.y + e.size, vx:0, vy:3.2, color:'#ffbb55'}); e.cooldown = Math.max(40,60 + Math.floor(Math.random()*120) - (chaosMode?40:0)); }
      // collision with player
      if (rectHit(e.x,e.y,e.size,e.size, player.x,player.y,player.w,player.h)){
        enemies.splice(i,1); sfx('explode'); if (!cheatActive){ player.lives--; spawnParticles(player.x+12, player.y+8, '#ff5577', 20, 2); if (player.lives>0){ respawnPlayer(); } else endGame(); } else { score += 14; }
      }
      if (e.y > cvs.height/(window.devicePixelRatio||1)+30) enemies.splice(i,1);
    }

    // asteroids update
    for (let i=asteroids.length-1;i>=0;i--){
      const a = asteroids[i]; a.y += a.speed; a.rot += a.spin; ctx.save(); ctx.translate(a.x + a.size/2, a.y + a.size/2); ctx.rotate(a.rot); ctx.fillStyle = '#ff9933'; ctx.fillRect(-a.size/2, -a.size/2, a.size, a.size); ctx.restore();
      if (rectHit(a.x,a.y,a.size,a.size, player.x,player.y,player.w,player.h)){
        asteroids.splice(i,1); sfx('explode'); if (!player.shield){ player.lives--; spawnParticles(player.x+12, player.y+8, '#ff5577', 26, 3); if (player.lives>0){ respawnPlayer(); } else endGame(); } else { player.shieldTimer -= 30; spawnParticles(player.x+12, player.y+8, '#88ddff', 8, 1); }
      }
      if (aiAlpha.alive && rectHit(a.x,a.y,a.size,a.size, aiAlpha.x,aiAlpha.y,aiAlpha.w,aiAlpha.h)){ aiAlpha.alive=false; aiAlpha.respawn = 240; spawnParticles(aiAlpha.x+10, aiAlpha.y+8,'#ff77aa',18); }
      if (aiBeta.alive && rectHit(a.x,a.y,a.size,a.size, aiBeta.x,aiBeta.y,aiBeta.w,aiBeta.h)){ aiBeta.alive=false; aiBeta.respawn = 320; spawnParticles(aiBeta.x+10, aiBeta.y+8,'#ffea00',18); }
      if (aiGamma.alive && rectHit(a.x,a.y,a.size,a.size, aiGamma.x,aiGamma.y,aiGamma.w,aiGamma.h)){ aiGamma.alive=false; aiGamma.respawn = 300; spawnParticles(aiGamma.x+8, aiGamma.y+6,'#ffd480',18); }
      if (a.y > cvs.height/(window.devicePixelRatio||1)+30){ asteroids.splice(i,1); score = Math.max(0, score - 1); }
    }

    // pickups
    for (let i=pickups.length-1;i>=0;i--){ const p = pickups[i]; p.y += p.vy; ctx.fillStyle = p.type==='score' ? '#ffd700' : (p.type==='shield'?'#88ddff': p.type==='rapid'?'#ffea00': p.type==='spread'?'#ffd480':'#66ff66'); ctx.fillRect(p.x, p.y, 12, 12); if (rectHit(p.x,p.y,12,12, player.x, player.y, player.w, player.h)){ applyPickup(p.type); sfx('pickup'); showFloating('+' + (p.type==='score'?75:10), p.x, p.y, '#fff'); pickups.splice(i,1); continue; } if (p.y > cvs.height/(window.devicePixelRatio||1)+40) pickups.splice(i,1); }

    // particles
    for (let i=particles.length-1;i>=0;i--){ const pt = particles[i]; pt.x += pt.vx; pt.y += pt.vy; pt.life--; pt.vy += 0.06; ctx.globalAlpha = Math.max(0, pt.life/100); ctx.fillStyle = pt.color; ctx.fillRect(pt.x, pt.y, pt.size, pt.size); ctx.globalAlpha = 1; if (pt.life<=0) particles.splice(i,1); }

    // floats
    for (let i=floats.length-1;i>=0;i--){ const f = floats[i]; f.y -= 0.6; f.life--; ctx.globalAlpha = f.alpha * Math.max(0, f.life/90); ctx.fillStyle = f.color; ctx.font='14px Orbitron, sans-serif'; ctx.textAlign='center'; ctx.fillText(f.txt, f.x, f.y); ctx.globalAlpha = 1; if (f.life<=0) floats.splice(i,1); }

    // respawn allies
    if (!aiAlpha.alive){ aiAlpha.respawn--; if (aiAlpha.respawn<=0){ aiAlpha.alive=true; aiAlpha.x = player.x; } }
    if (!aiBeta.alive && cheatActive){ aiBeta.respawn--; if (aiBeta.respawn<=0){ aiBeta.alive=true; aiBeta.x = player.x + 40; } }
    if (!aiGamma.alive && cheatActive){ aiGamma.respawn--; if (aiGamma.respawn<=0){ aiGamma.alive=true; aiGamma.x = player.x - 40; } }

    // combo decay
    if (comboTimer > 0) { comboTimer--; } else { multiplier = Math.max(1, multiplier - 0.03); }

    updateHUD(); if (!isOver) requestAnimationFrame(loop);
  }

  function drawBackground(){
    ctx.fillStyle = 'rgba(4,4,10,0.25)'; ctx.fillRect(0,0,cvs.width/(window.devicePixelRatio||1),cvs.height/(window.devicePixelRatio||1));
    for (let i=0;i<140;i++){ const x = (i*47 + frame*0.2) % (cvs.width/(window.devicePixelRatio||1)); const y = ((i*89) % (cvs.height/(window.devicePixelRatio||1))) + Math.sin((frame + i)*0.02)*(1.2); const s = (i%7===0)?2:1; ctx.fillStyle = (i%17===0)?'#00e6b8': (i%11===0)?'#ffdce6':'#9fb6ff'; ctx.globalAlpha = 0.35 + Math.sin((frame+i)*0.06)*0.25; ctx.fillRect(x, y, s, s); ctx.globalAlpha = 1; }
    const g = ctx.createRadialGradient(80,80,10, 360,360,620); g.addColorStop(0,'rgba(0,255,200,0.02)'); g.addColorStop(1,'rgba(255,64,129,0.00)'); ctx.fillStyle = g; ctx.fillRect(0,0,cvs.width/(window.devicePixelRatio||1),cvs.height/(window.devicePixelRatio||1));
  }

  function drawPlayer(pl){ ctx.save(); if (pl.invul>0) ctx.globalAlpha = 0.6 + Math.sin(frame*0.4)*0.2; ctx.shadowBlur = 14; ctx.shadowColor = '#00e6b8'; ctx.fillStyle = '#00e6b8'; ctx.beginPath(); ctx.moveTo(pl.x + pl.w/2, pl.y); ctx.lineTo(pl.x + pl.w, pl.y + pl.h); ctx.lineTo(pl.x, pl.y + pl.h); ctx.closePath(); ctx.fill(); ctx.restore(); ctx.fillStyle = '#001f17'; ctx.fillRect(pl.x + pl.w/2 - 5, pl.y + 4, 10, 6); if (pl.shield && pl.shieldTimer > 0){ ctx.save(); ctx.globalAlpha = 0.18 + Math.sin(frame*0.18)*0.08; ctx.strokeStyle='#88ddff'; ctx.lineWidth=3; ctx.beginPath(); ctx.ellipse(pl.x + pl.w/2, pl.y + pl.h/2, pl.w*1.5, pl.h*1.5, 0, 0, Math.PI*2); ctx.stroke(); ctx.restore(); }
    if (pl.invul>0) pl.invul--;
  }

  function aiTick(ai, accuracy=1, splitShot=false, single=false){ if (!ai.alive) return; const targets = activeBoss ? [activeBoss] : (asteroids.length ? asteroids : enemies); let target = targets.length ? targets[0] : null; if (targets.length>1) target = targets[Math.floor(Math.random()*Math.min(3,targets.length))]; if (target){ const tCenter = (target.x + ((target.size||target.w)/2)); const aiCenter = ai.x + ai.w/2; if (aiCenter < tCenter - 6) ai.x += ai.speed * accuracy; else if (aiCenter > tCenter + 6) ai.x -= ai.speed * accuracy; if (ai.cooldown <= 0 && Math.abs(aiCenter - tCenter) < 100*accuracy){ if (splitShot){ shotFrom(ai.x + 4, ai.y, '#ffea00', 1, true); shotFrom(ai.x + ai.w - 4, ai.y, '#ffea00', 1, true); } else { shotFrom(ai.x + ai.w/2, ai.y, '#ff00ff', 1, true); } ai.cooldown = 12 + Math.floor(Math.random()*18); } } if (ai.cooldown > 0) ai.cooldown--; ctx.fillStyle = (ai===aiAlpha? '#ff00ff' : ai===aiBeta? '#ffea00' : '#ffd480'); ctx.fillRect(ai.x, ai.y + 8, ai.w, ai.h - 8); ctx.fillRect(ai.x + Math.max(2,ai.w/4), ai.y, ai.w - Math.max(4,ai.w/4*2), 8); }

  function shotFrom(x,y,color,dmg,fromPlayer){ const spreads = player.spread ? [-8,0,8] : [0]; for (let off of spreads){ lasers.push({ x: x + off, y: y, vy: 11, color: color, dmg: dmg }); } }
  function bossFire(x,y,vx,vy,color){ enemyBullets.push({ x, y, vx, vy, color }); sfx('hit', 0.9); }

  function applyPickup(type){ if (type==='rapid'){ player.rapid = true; setTimeout(()=>player.rapid = false, 16000); showTemporary('RAPID FIRE', '#ffea00'); } if (type==='shield'){ player.shield = true; player.shieldTimer = 220; setTimeout(()=>{ player.shield=false; }, 16000); showTemporary('SHIELD', '#88ddff'); } if (type==='spread'){ player.spread = true; setTimeout(()=>player.spread=false, 16000); showTemporary('SPREAD SHOT', '#ffd480'); } if (type==='bomb'){ spawnParticles(player.x+12, player.y, '#ff77aa', 60, 4); for (let i=enemies.length-1;i>=0;i--){ score += 25 * multiplier; showFloating('+25', enemies[i].x, enemies[i].y, '#ffd700'); enemies.splice(i,1); } sfx('explode'); } if (type==='score'){ score += 100 * multiplier; showFloating('+100', player.x + 10, player.y - 8, '#ffd700'); } }

  function showTemporary(txt,color){ showFloating(txt, player.x+12, player.y-18, color); }

  // initial menu
  showMenu();

  // begin draw loop even while static so canvas looks lively
  requestAnimationFrame(function idle(){ drawBackground(); ctx.globalAlpha = 0.6; drawPlayer({x: 360, y: 440, w:28, h:24, shield:false, invul:0}); ctx.globalAlpha = 1; if (!running) requestAnimationFrame(idle); });

  // small safeguard: resume audio on first user gesture
  window.addEventListener('pointerdown', ()=>{ try{ ensureAudio(); if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }catch(e){} }, { once:true });
  </script>
</body>
