<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Cavern Escape</title>
    <style>
        body { background: #020205; color: #00ffff; font-family: monospace; text-align: center; margin: 0; padding: 10px; overflow: hidden; }
        .arcade-frame { max-width: 460px; margin: 5px auto; background: #0c0d1a; padding: 15px; border: 3px solid #00ffff; box-shadow: 0 0 15px #00ffff; border-radius: 6px; }
        #canvas { background: #000000; display: block; margin: 10px auto; border: 2px solid #333; }
        .hud { display: flex; justify-content: space-between; background: #121528; padding: 8px; border: 1px solid #00ffff; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .meter-bar { background: #222; width: 100%; height: 10px; border: 1px solid #ff00ff; position: relative; margin-bottom: 5px; }
        #meter-fill { background: #ff00ff; height: 100%; width: 100%; }
    </style>
</head>
<body>

<div class="arcade-frame">
    <div style="font-size: 18px; font-weight: bold; letter-spacing: 2px;">⚡ CAVERN NAVIGATOR ⚡</div>
    
    <div class="hud">
        <div id="phase-lbl" style="color:#ffff00;">CAVERN PHASE: 1</div>
        <div>METERS FLYED: <span id="score-lbl" style="color:#00ff66;">0m</span></div>
        <div>HULL: <span id="hull-lbl" style="color:#ff3333;">100%</span></div>
    </div>

    <!-- Special Phase Shift Energy Bar Dashboard -->
    <div class="meter-bar">
        <div id="meter-fill"></div>
    </div>

    <canvas id="canvas" width="420" height="340"></canvas>

    <button style="background:#ff00ff; color:#fff; font-family:monospace; font-weight:bold; border:2px solid #fff; padding:10px 20px; cursor:pointer;" onclick="bootGame()">LAUNCH SYSTEM</button>
    <div style="font-size: 10px; color: #557799; margin-top: 8px; font-weight: bold; line-height: 14px;">
        STEERING: Use [◀ ▲ ▼ ▶] Arrow Keys to fly inside the gap.<br>
        <span style="color:#ff00ff;">PHASE SHIFT ABILITY: Press [SHIFT] to glide through walls for 2 seconds!</span>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let gameActive = false, score = 0, playerHp = 100, currentPhase = 1;
    let playerX = 200, playerY = 280, playerSize = 16, shipSpeed = 5;
    let keys = {};
    
    let phaseShiftTimer = 0, abilityCharge = 100;
    let cavernWalls = [];
    let scrollSpeed = 3, wallTick = 0;

    const phaseStyles = {
        1: { name: "Asteroid Crust", color: "#663300", gapSize: 150 },
        2: { name: "Magma Pockets", color: "#ff3300", gapSize: 135 },
        3: { name: "Crystal Crevice", color: "#00ffff", gapSize: 120 },
        4: { name: "Frozen Tundra", color: "#0066ff", gapSize: 110 },
        5: { name: "Radioactive Trench", color: "#33ff33", gapSize: 100 },
        6: { name: "Gravity Warp Cave", color: "#cc00cc", gapSize: 90 },
        7: { name: "Plasma Depths", color: "#ff00ff", gapSize: 85 },
        8: { name: "Void Fractures", color: "#ffffff", gapSize: 80 },
        9: { name: "Singularity Core", color: "#ffcc00", gapSize: 75 },
        10: { name: "Omega Desolation", color: "#ff0055", gapSize: 65 }
    };

    window.addEventListener('keydown', (e) => { keys[e.code] = true; if(e.code === "ShiftLeft" || e.code === "ShiftRight") triggerPhaseShift(); });
    window.addEventListener('keyup', (e) => { keys[e.code] = false; });

    function bootGame() {
        score = 0; playerHp = 100; currentPhase = 1; scrollSpeed = 3;
        playerX = 200; playerY = 280; phaseShiftTimer = 0; abilityCharge = 100;
        cavernWalls = [];
        
        // Generate baseline initial tunnel segments map grid
        for (let i = 0; i < canvas.height; i += 10) {
            cavernWalls.push({ y: i, center: 210, size: phaseStyles[1].gapSize });
        }
        
        gameActive = true;
        document.getElementById('score-lbl').innerText = score + "m";
        document.getElementById('hull-lbl').innerText = playerHp + "%";
        document.getElementById('phase-lbl').innerText = `PHASE 1: Asteroid Crust`;
        
        requestAnimationFrame(runLoop);
    }

    function triggerPhaseShift() {
        if (abilityCharge < 100 || !gameActive) return;
        phaseShiftTimer = 120; // 2 seconds at 60fps frame calculations loop
        abilityCharge = 0;
    }

    function runLoop() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 4-Way Steering Mechanics
        if (keys['ArrowLeft'] && playerX > 0) playerX -= shipSpeed;
        if (keys['ArrowRight'] && playerX < canvas.width - playerSize) playerX += shipSpeed;
        if (keys['ArrowUp'] && playerY > 0) playerY -= shipSpeed;
        if (keys['ArrowDown'] && playerY < canvas.height - playerSize) playerY += shipSpeed;

        // Manage Recharge Variables
        if (phaseShiftTimer > 0) {
            phaseShiftTimer--;
            document.getElementById('meter-fill').style.width = (phaseShiftTimer / 120) * 100 + "%";
        } else if (abilityCharge < 100) {
            abilityCharge += 0.3;
            document.getElementById('meter-fill').style.width = abilityCharge + "%";
        }

        // Shift and advance cave segments mapping arrays data array
        wallTick += scrollSpeed;
        if (wallTick >= 10) {
            wallTick = 0;
            score += 1;
            document.getElementById('score-lbl').innerText = score + "m";
            
            // Advance Phase metrics dynamically every 50 meters
            let nextLvl = Math.floor(score / 50) + 1;
            if (nextLvl > currentPhase && nextLvl <= 10) {
                currentPhase = nextLvl;
                scrollSpeed += 0.6;
                document.getElementById('phase-lbl').innerText = `PHASE ${currentPhase}: ${phaseStyles[currentPhase].name}`;
            }

            // Calculate movement shifts for new cave sections
            let lastWall = cavernWalls[0];
            let currentGapSize = phaseStyles[currentPhase].gapSize;
            let centerVariance = (Math.random() * 16 - 8) + lastWall.center;
            
            // Wall clamps boundary locks
            if (centerVariance < currentGapSize / 2 + 10) centerVariance = currentGapSize / 2 + 10;
            if (centerVariance > canvas.width - (currentGapSize / 2 + 10)) centerVariance = canvas.width - (currentGapSize / 2 + 10);

            cavernWalls.pop();
            cavernWalls.unshift({ y: 0, center: centerVariance, size: currentGapSize });
        }

        // Draw Cavern Walls System
        ctx.fillStyle = phaseStyles[currentPhase].color;
        for (let i = 0; i < cavernWalls.length; i++) {
            let segment = cavernWalls[i];
            segment.y += scrollSpeed;
            if (segment.y > canvas.height) segment.y = 0;

            let leftWidth = segment.center - (segment.size / 2);
            let rightStart = segment.center + (segment.size / 2);

            ctx.fillRect(0, segment.y, leftWidth, 10);
            ctx.fillRect(rightStart, segment.y, canvas.width - rightStart, 10);

            // Matrix intersection checkpoint check for collision boxes
            if (phaseShiftTimer <= 0 && playerY >= segment.y && playerY <= segment.y + 10) {
                if (playerX <= leftWidth || playerX + playerSize >= rightStart) {
                    playerHp -= 1.5; // Constant hull friction decay points
                    document.getElementById('hull-lbl').innerText = Math.ceil(playerHp) + "%";
                    if (playerHp <= 0) terminateGame();
                }
            }
        }

        // Draw Player Space Scout Sprite Model
        ctx.font = "20px Arial";
        if (phaseShiftTimer > 0) {
            ctx.fillStyle = "rgba(0, 255, 255, 0.4)"; // Opacity indicator for active invincibility
            ctx.fillText("🛸", playerX - 2, playerY + 14);
        } else {
            ctx.fillStyle = "#ffffff";
            ctx.fillText("🚀", playerX - 2, playerY + 14);
        }

        requestAnimationFrame(runLoop);
    }

    function terminateGame() {
        gameActive = false;
        ctx.fillStyle = "rgba(0,0,0,0.9)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = "bold 20px monospace";
        ctx.fillStyle = "#ff3333";
        ctx.fillText("SHIP CRASHED / HULL BREACH", 50, 160);
        ctx.fillStyle = "#ffffff";
        ctx.font = "14px monospace";
        ctx.fillText(`Distance: ${score}m | Final Zone Phase: ${currentPhase}`, 55, 200);
    }
</script>
</body>
</html>
