<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Cyberband Sequencer</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --border-color: #30363d;
            --accent-active: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.4);
            --text-main: #c9d1d9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }

        p {
            color: #8b949e;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .sequencer-container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
        }

        button {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }

        button.playing {
            background-color: #238636;
            color: #ffffff;
            border-color: #2ea44f;
            box-shadow: 0 0 10px rgba(46, 164, 79, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: 80px repeat(8, 1fr);
            gap: 8px;
        }

        .row-label {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pad {
            aspect-ratio: 1;
            background-color: #21262d;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.1s, box-shadow 0.1s;
        }

        .pad:hover {
            background-color: #30363d;
        }

        .pad.active {
            background-color: var(--accent-active);
            border-color: #79c0ff;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .pad.current-step {
            outline: 2px solid #ffffff;
            outline-offset: 1px;
        }
    </style>
</head>
<body>

    <h1>🤖 Cyberband Neo</h1>
    <p>Click pads to sketch a custom synth beat loop, then hit play!</p>

    <div class="sequencer-container">
        <div class="controls">
            <button id="playBtn">START BEAT</button>
            <button id="clearBtn">CLEAR ALL</button>
        </div>

        <div class="grid" id="sequencerGrid">
            <!-- Labels and pads will be generated via JavaScript -->
        </div>
    </div>

    <script>
        const tracks = ['Kick', 'Snare', 'Hi-Hat', 'Synth'];
        const steps = 8;
        let isPlaying = false;
        let currentStep = 0;
        let intervalId = null;
        
        // Audio Context setup initialization
        let audioCtx = null;

        // Visual elements setup
        const grid = document.getElementById('sequencerGrid');
        const playBtn = document.getElementById('playBtn');
        const clearBtn = document.getElementById('clearBtn');

        // Build internal matrix tracking state
        const gridState = tracks.map(() => Array(steps).fill(false));

        // UI Grid initialization loop
        tracks.forEach((trackName, rowIndex) => {
            const label = document.createElement('div');
            label.className = 'row-label';
            label.textContent = trackName;
            grid.appendChild(label);

            for (let colIndex = 0; colIndex < steps; colIndex++) {
                const pad = document.createElement('div');
                pad.className = 'pad';
                pad.dataset.row = rowIndex;
                pad.dataset.col = colIndex;

                pad.addEventListener('click', () => {
                    const active = gridState[rowIndex][colIndex];
                    gridState[rowIndex][colIndex] = !active;
                    pad.classList.toggle('active');
                });

                grid.appendChild(pad);
            }
        });

        // Synthetic Instruments Synthesis Logic via Web Audio API
        function playSound(trackIndex) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (trackIndex === 0) { // Kick Drum configuration
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.3);
                gain.gain.setValueAtTime(1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } 
            else if (trackIndex === 1) { // Snare Drum configuration
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(180, now);
                gain.gain.setValueAtTime(0.7, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } 
            else if (trackIndex === 2) { // Hi-Hat configuration
                osc.type = 'square';
                osc.frequency.setValueAtTime(10000, now);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            } 
            else if (trackIndex === 3) { // Synth Lead Melody configuration
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, now); // A4 pitch node
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            }
        }

        // Loop Sequence Logic Step Engine
        function tickEngine() {
            const allPads = document.querySelectorAll('.pad');
            allPads.forEach(p => p.classList.remove('current-step'));

            const stepPads = document.querySelectorAll(`[data-col="${currentStep}"]`);
            stepPads.forEach(pad => {
                pad.classList.add('current-step');
                const row = parseInt(pad.dataset.row);
                if (gridState[row][currentStep]) {
                    playSound(row);
                }
            });

            currentStep = (currentStep + 1) % steps;
        }

        // Play/Pause Click Handler Event Hook
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                clearInterval(intervalId);
                playBtn.textContent = "START BEAT";
                playBtn.classList.remove('playing');
                const allPads = document.querySelectorAll('.pad');
                allPads.forEach(p => p.classList.remove('current-step'));
            } else {
                currentStep = 0;
                tickEngine(); 
                intervalId = setInterval(tickEngine, 300); // 300ms playback pace pacing step engine
                playBtn.textContent = "STOP BEAT";
                playBtn.classList.add('playing');
            }
            isPlaying = !isPlaying;
        });

        // Board Cleardown Utility Reset Event Hook
        clearBtn.addEventListener('click', () => {
            const allPads = document.querySelectorAll('.pad');
            allPads.forEach(p => {
                p.classList.remove('active');
                p.classList.remove('current-step');
            });
            for (let r = 0; r < tracks.length; r++) {
                gridState[r].fill(false);
            }
            if (isPlaying) {
                playBtn.click();
            }
        });
    </script>
</body>
</html>
