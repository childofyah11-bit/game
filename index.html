<style> 
  #game-box { text-align: center; font-family: sans-serif; background: #040407; color: #00ffcc; padding: 15px; } 
  canvas { background: #0d0d1a; border: 2px solid #ff4081; border-radius: 8px; outline: none; } 
</style> 

<div id="game-box"> 
  <!-- THE CHEAT: Hold SHIFT and click this title 3 times to unlock rapid fire! --> 
  <h1 id="cheat-btn" style="cursor: pointer; font-size: 22px; margin: 0 0 5px 0; user-select: none;">🌌 Dodger game</h1> 
  <div id="score" style="font-size: 16px; font-weight: bold; margin-bottom: 5px;">SCORE: 0</div> 
  <canvas id="canvas" width="320" height="400" tabindex="1"></canvas> 
  <p style="color: #888; font-size: 11px; margin-top: 5px;">[Left/Right Arrows to Move | Space to Shoot]</p> 
</div> 

<script> 
const cvs = document.getElementById('canvas'); 
const ctx = cvs.getContext('2d'); 

// Baseline game variables
let score = 0;
let isOver = false;
let frame = 0;
let playerX = 145;

// Lists to hold game objects
let asteroids = []; 
let lasers = []; 

// Cheat tracking variables
let clickCount = 0;
let cheatActive = false; 
let weaponCooldown = 0;

// Input movement tracking
const keys = { ArrowLeft: false, ArrowRight: false, Space: false, Shift: false }; 

window.addEventListener('keydown', (e) => { 
  if (e.key === "Shift") keys.Shift = true; 
  if (e.key === "ArrowLeft") { e.preventDefault(); keys.ArrowLeft = true; } 
  if (e.key === "ArrowRight") { e.preventDefault(); keys.ArrowRight = true; } 
  if (e.key === " ") { e.preventDefault(); keys.Space = true; } 
}); 

window.addEventListener('keyup', (e) => { 
  if (e.key === "Shift") keys.Shift = false; 
  if (e.key === "ArrowLeft") keys.ArrowLeft = false; 
  if (e.key === "ArrowRight") keys.ArrowRight = false; 
  if (e.key === " ") keys.Space = false; 
}); 

// EPIC SHIFT + 3-CLICK CHEAT SWITCH 
document.getElementById('cheat-btn').addEventListener('click', () => { 
  if (keys.Shift) { 
    clickCount++; 
    if (clickCount >= 3) { 
      cheatActive = true; 
      document.getElementById('cheat-btn').style.color = '#ffea00'; // Title turns gold when cheat is on
      clickCount = 0; 
      if (isOver) resetGame();
    } 
  } else { 
    clickCount = 0; 
    if (isOver) resetGame(); // Click title to restart on Game Over
  } 
}); 

function updateScoreUI() { 
  document.getElementById('score').innerText = `SCORE: ${score}`;
} 

function resetGame() { 
  score = 0; 
  isOver = false; 
  frame = 0; 
  playerX = 145; 
  asteroids = []; 
  lasers = []; 
  cheatActive = false;
  document.getElementById('cheat-btn').style.color = '#00ffcc';
  updateScoreUI(); 
  loop(); 
} 

function loop() { 
  if (isOver) { 
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; 
    ctx.fillRect(0, 0, 320, 400); 
    ctx.fillStyle = '#ff4081'; 
    ctx.font = 'bold 20px sans-serif'; 
    ctx.textAlign = 'center'; 
    ctx.fillText('💥 GAME OVER 💥', 160, 180); 
    ctx.font = '13px sans-serif';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('Click the Title to Restart', 160, 220);
    return; 
  } 

  // Clear screen every frame
  ctx.clearRect(0, 0, 320, 400); 
  frame++; 

  // Move Player Ship
  if (keys.ArrowLeft && playerX > 0) playerX -= 5; 
  if (keys.ArrowRight && playerX < 294) playerX += 5; 

  // Weapon Cooldown Ticker
  if (weaponCooldown > 0) weaponCooldown--; 

  // Shoot Lasers (Cheat drastically cuts down weapon cooldown)
  if (keys.Space && weaponCooldown === 0) { 
    lasers.push({ x: playerX + 11, y: 350, w: 4, h: 10 }); 
    weaponCooldown = cheatActive ? 3 : 15; 
  } 

  // Draw Player Ship (Cyan Triangle)
  ctx.fillStyle = '#00ffcc'; 
  ctx.beginPath(); 
  ctx.moveTo(playerX + 13, 350); 
  ctx.lineTo(playerX + 26, 375); 
  ctx.lineTo(playerX, 375); 
  ctx.closePath(); 
  ctx.fill(); 

  // Spawn Asteroids every 40 frames
  if (frame % 40 === 0) { 
    asteroids.push({ 
      x: Math.random() * 290, 
      y: -20, 
      size: Math.random() * 15 + 15, 
      speed: Math.random() * 2 + 2 
    }); 
  } 

  // Process Lasers Physics
  for (let i = lasers.length - 1; i >= 0; i--) { 
    let l = lasers[i]; 
    l.y -= 7; // Lasers fly up

    // Draw Laser (Green lines)
    ctx.fillStyle = '#00ff00';
    ctx.fillRect(l.x, l.y, l.w, l.h); 

    // Check laser hit on Asteroids
    for (let j = asteroids.length - 1; j >= 0; j--) { 
      let a = asteroids[j]; 
      if (l.x < a.x + a.size && l.x + l.w > a.x && l.y < a.y + a.size && l.y + l.h > a.y) { 
        lasers.splice(i, 1); 
        asteroids.splice(j, 1); 
        score += 10; 
        updateScoreUI(); 
        break; 
      } 
    } 
    // Clear old off-screen lasers
    if (l && l.y < -20) lasers.splice(i, 1); 
  } 

  // Process Asteroids Physics
  for (let b = asteroids.length - 1; b >= 0; b--) { 
    let ast = asteroids[b]; 
    ast.y += ast.speed; // Asteroids fall down

    // Draw Asteroid (Orange squares)
    ctx.fillStyle = '#ff9900'; 
    ctx.fillRect(ast.x, ast.y, ast.size, ast.size); 

    // Check Asteroid crashing into Player Ship
    if (playerX < ast.x + ast.size && playerX + 26 > ast.x && 350 < ast.y + ast.size && 375 > ast.y) { 
      isOver = true; 
      continue; 
    } 

    // Clear old off-screen asteroids
    if (ast.y > 420) asteroids.splice(b, 1); 
  } 

  requestAnimationFrame(loop); 
} 

// Start the game loop
loop(); 
</script>
