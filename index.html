<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Core Decryptor</title>
    <style>
        body { background: #020202; color: #33ff33; font-family: 'Courier New', monospace; text-align: center; padding: 10px; margin: 0; }
        .container { max-width: 650px; margin: 15px auto; background: #000b00; padding: 20px; border-radius: 4px; border: 2px solid #00aa00; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); }
        
        /* The Cyber-Matrix Grid Display Screen */
        .mainframe { position: relative; width: 100%; height: 240px; background: #000500; border: 1px solid #00ff00; border-radius: 2px; margin-bottom: 15px; overflow: hidden; }
        .grid-lines { position: absolute; width: 100%; height: 100%; background: linear-gradient(rgba(0,50,0,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,50,0,0.1) 1px, transparent 1px); background-size: 20px 20px; }
        
        /* Cyber Icons Nodes */
        .node { position: absolute; bottom: 50px; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; }
        #hacker-node { left: 40px; border: 1px dashed #33ff33; background: rgba(0,255,0,0.05); }
        #ai-core { right: 40px; width: 110px; height: 110px; bottom: 35px; border: 1px solid #ff3333; background: rgba(255,0,0,0.05); font-size: 28px; transition: all 0.2s; }
        
        /* Animation Packets */
        .data-packet { position: absolute; width: 14px; height: 14px; border-radius: 3px; display: none; z-index: 10; font-size: 12px; line-height: 14px; text-align: center; font-weight: bold; }
        .firewall-shield { position: absolute; width: 90px; height: 90px; border: 2px solid #00ffff; left: 34px; bottom: 44px; display: none; box-shadow: 0 0 10px #00ffff; }
        .floating-text { position: absolute; font-size: 18px; font-weight: bold; animation: alertRise 0.6s ease-out forwards; z-index: 20; pointer-events: none; }
        
        /* UI Panels & Script Slots */
        .status-rack { display: flex; justify-content: space-between; margin-bottom: 15px; gap: 10px; }
        .status-box { background: #001100; padding: 8px; width: 48%; border: 1px solid #005500; text-align: left; }
        .meter { background: #112211; width: 100%; height: 10px; overflow: hidden; margin-top: 5px; border: 1px solid #004400; }
        .meter-fill { height: 100%; width: 100%; transition: width 0.2s; }
        
        .deck-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button { background: #001500; color: #33ff33; border: 1px solid #00ff00; padding: 12px; font-size: 12px; font-weight: bold; font-family: 'Courier New', monospace; cursor: pointer; }
        button:hover { background: #00ff00; color: #000; box-shadow: 0 0 8px #00ff00; }
        button:active { transform: scale(0.98); }
        
        #scrolling-terminal { background: #000200; border: 1px solid #004400; padding: 8px; height: 90px; overflow-y: auto; font-size: 11px; text-align: left; color: #33cc33; }

        @keyframes alertRise { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-35px); opacity: 0; } }
        @keyframes GlitchShake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); } 60% { transform: translateX(5px); } }
    </style>
</head>
<body>

<div class="container">
    <div style="font-size: 16px; font-weight: bold; margin-bottom: 10px; letter-spacing: 3px; color: #00ff00;">⚡ MAINFRAME BREACH IN PROGRESS ⚡</div>
    
    <!-- Mainframe Grid Monitor -->
    <div class="mainframe" id="matrix-display">
        <div class="grid-lines"></div>
        <div id="hacker-node" class="node">👨‍💻<br><span style="font-size:9px; color:#33ff33; margin-top:4px;">LOCAL_IP</span></div>
        <div id="ai-core" class="node">🧠<br><span id="layer-tag" style="font-size:10px; color:#ffcc00; margin-top:4px;">SEC_LVL: 1</span></div>
        
        <div id="firewall-visual" class="firewall-shield"></div>
        <div id="data-beam" class="data-packet"></div>
    </div>

    <!-- Interface Matrix Analytics -->
    <div class="status-rack">
        <div class="status-box">
            <div style="color: #33ff33; font-weight: bold; font-size: 11px;">DECK PORT PROXITY</div>
            <div class="meter"><div id="p-fill" class="meter-fill" style="background: #33ff33;"></div></div>
            <div id="p-lbl" style="font-size: 11px; margin-top: 3px;">SIGNAL: 100%</div>
        </div>
        <div class="status-box">
            <div id="b-name" style="color: #ff3333; font-weight: bold; font-size: 11px;">L1: Firewall Gateway</div>
            <div class="meter"><div id="b-fill" class="meter-fill" style="background: #ff3333;"></div></div>
            <div id="b-lbl" style="font-size: 11px; margin-top: 3px;">CORE INTEGRITY: 1000/1000</div>
        </div>
    </div>

    <!-- Script Injection Board -->
    <div class="deck-buttons">
        <button onclick="runScript('brute')">[BRUTE_FORCE]</button>
        <button onclick="runScript('patch')">[INJECT_PATCH]</button>
        <button onclick="runScript('proxy')">[LOAD_PROXY]</button>
    </div>

    <p style="font-size: 11px; color: #005500; text-align: left; margin: 12px 0 2px 2px; font-weight: bold;">CONSOLE TERMINAL READOUT:</p>
    <div id="scrolling-terminal"></div>
</div>

<script>
    let maxBossHp = 1000, bossHp = 1000;
    let playerMaxHp = 100, playerHp = 100;
    let isShielded = false, currentPhase = 1, threadLock = false;

    const securityLayers = {
        1: { name: "Firewall Gateway", power: 6, hexColor: "rgba(0,150,0,0.1)", avatar: "🧠" },
        2: { name: "Proxy Deflector", power: 9, hexColor: "rgba(200,100,0,0.1)", avatar: "💾" },
        3: { name: "IDS Scanner Engine", power: 13, hexColor: "rgba(150,150,0,0.1)", avatar: "📡" },
        4: { name: "Encrypted Registry", power: 17, hexColor: "rgba(100,0,150,0.1)", avatar: "🖲️" },
        5: { name: "Data Sandbox Node", power: 22, hexColor: "rgba(0,100,150,0.1)", avatar: "🔒" },
        6: { name: "Logic Bomb Array", power: 26, hexColor: "rgba(80,80,80,0.1)", avatar: "💣" },
        7: { name: "Honey-Pot Subnet", power: 31, hexColor: "rgba(180,50,150,0.1)", avatar: "🍯" },
        8: { name: "Neural Sentinel Core", power: 36, hexColor: "rgba(200,0,100,0.1)", avatar: "👁️" },
        9: { name: "Decoy Rootkit Matrix", power: 42, hexColor: "rgba(220,80,0,0.1)", avatar: "🪐" },
        10: { name: "Quantum AI Singularity", power: 49, hexColor: "rgba(255,0,0,0.2)", avatar: "☄️" }
    };

    function printTerminal(txt) {
        const out = document.getElementById('scrolling-terminal');
        out.innerHTML += `<div>$ ${txt}</div>`;
        out.scrollTop = out.scrollHeight;
    }

    function floatFeedback(nodeId, str, color) {
        const node = document.getElementById(nodeId);
        const rect = node.getBoundingClientRect();
        const displayRect = document.getElementById('matrix-display').getBoundingClientRect();
        
        const floatTxt = document.createElement('div');
        floatTxt.className = 'floating-text';
        floatTxt.innerText = str;
        floatTxt.style.color = color;
        floatTxt.style.left = (rect.left - displayRect.left + (rect.width/2) - 10) + 'px';
        floatTxt.style.top = (rect.top - displayRect.top - 10) + 'px';
        
        document.getElementById('matrix-display').appendChild(floatTxt);
        setTimeout(() => floatTxt.remove(), 600);
    }

    function renderTerminalScreen() {
        const bPct = Math.max(0, (bossHp / maxBossHp) * 100);
        document.getElementById('b-fill').style.width = bPct + '%';
        document.getElementById('b-lbl').innerText = `CORE INTEGRITY: ${Math.ceil(bossHp)} / ${maxBossHp}`;
        document.getElementById('b-name').innerText = `L${currentPhase}: ${securityLayers[currentPhase].name}`;
        
        const pPct = Math.max(0, (playerHp / playerMaxHp) * 100);
        document.getElementById('p-fill').style.width = pPct + '%';
        document.getElementById('p-lbl').innerText = `SIGNAL PROXITY: ${playerHp}%`;

        const bSprite = document.getElementById('ai-core');
        bSprite.style.backgroundColor = securityLayers[currentPhase].hexColor;
        bSprite.style.borderColor = currentPhase === 10 ? "#ff0000" : "#00ff00";
        bSprite.innerHTML = `${securityLayers[currentPhase].avatar}<br><span id="layer-tag" style="font-size:9px; color:#ffcc00;">SEC_LVL: ${currentPhase}</span>`;

        document.getElementById('firewall-visual').style.display = isShielded ? 'block' : 'none';
    }

    function runScript(scriptType) {
        if (playerHp <= 0 || bossHp <= 0 || threadLock) return;
        threadLock = true;

        const beam = document.getElementById('data-beam');
        beam.style.display = "block";
        
        if (scriptType === 'brute') {
            beam.innerText = "01";
            beam.style.color = "#33ff33";
            beam.style.left = "80px";
            beam.style.bottom = "85px";
            
            let posX = 80;
            let tick = setInterval(() => {
                posX += 20;
                beam.style.left = posX + "px";
                beam.innerText = Math.random() > 0.5 ? "10" : "01";
                if (posX >= 480) {
                    clearInterval(tick);
                    beam.style.display = "none";
                    
                    let bitsCorrupted = Math.floor(Math.random() * 12) + 18;
                    bossHp -= bitsCorrupted;
                    floatFeedback('ai-core', `-${bitsCorrupted}b`, '#ff3333');
                    document.getElementById('ai-core').style.animation = "GlitchShake 0.15s alternate 2";
                    printTerminal(`EXECUTE: Brute Force Overflow script. Corrupted <span style="color:#ff3333">${bitsCorrupted} database sectors</span>.`);
                    
gerPop('player-ship', `+${hullFix}`, '#00ff66');
