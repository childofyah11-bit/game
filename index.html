<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Space Strike</title>
    <style>
        body { background: #020205; color: #00ffcc; font-family: monospace; text-align: center; margin: 0; padding: 10px; overflow: hidden; }
        .cabinet { max-width: 460px; margin: 5px auto; background: #0b0c16; padding: 12px; border: 3px solid #00ffcc; box-shadow: 0 0 15px #00ffcc; }
        #canvas { background: #000000; display: block; margin: 8px auto; border: 2px solid #222; }
        .hud { display: flex; justify-content: space-between; background: #111424; padding: 8px; border: 1px solid #00ffcc; font-size: 12px; font-weight: bold; }
        .btn { background: #ff00ff; color: #fff; border: 2px solid #fff; padding: 10px 20px; font-size: 14px; font-weight: bold; font-family: monospace; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<div class="cabinet">
    <div style="font-size: 18px; font-weight: bold; letter-spacing: 2px;">⚡ GALACTIC INTERCEPTOR ⚡</div>
    
    <div class="hud">
        <div id="target-lbl" style="color:#ff3333;">OBJECTIVE: DEFEND</div>
        <div>SCORE: <span id="score-lbl" style="color:#00ff66;">0</span></div>
        <div>HULL: <span id="hull-lbl" style="color:#ff3333;">100%</span></div>
    </div>

    <canvas id="canvas" width="420" height="360"></canvas>

    <button class="btn" onclick="bootEngine()">LAUNCH SHIP</button>
    <div style="font-size: 10px; color: #557799; margin-top: 6px; font-weight: bold; line-height: 14px;">
        FLY: [◀ LEFT / RIGHT ▶] Arrow Keys | FIRE: [SPACEBAR]<br>
        <span style="color:#ff00ff;">SPECIAL POWER: Press [SHIFT] to raise a 3-Second Shield Bubble!</span>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let gameActive = false, score = 0, playerHp = 100, currentPhase = 0;
    let playerX = 190, playerSpeed = 7, keys = {};
    let lasers = [], enemies = [], specialShieldTime = 0, shieldCharge = 100;
    let spawnTimer = 0;

    let bossActive = false, bossX = 160, bossY = -50, bossHp = 1000, maxBossHp = 1000, bossDir = 1;

    const bossPhases = {
        1: { name: "Doom Cruiser", color: "#ff3333" },
        2: { name: "Viper Titan", color: "#ff6600" },
        3: { name: "Void Carrier", color: "#ffcc00" },
        4: { name: "Swarm Flagship", color: "#cc00cc" },
        5: { name: "Eclipse Citadel", color: "#9900cc" },
        6: { name: "Quantum Core", color: "#3333ff" },
        7: { name: "Nebula Ravager", color: "#00ffff" },
        8: { name: "Hyperion Pod", color: "#00ff66" },
        9: { name: "Chaos Star", color: "#ffffff" },
        10: { name: "Omega Dreadnought", color: "#ff00ff" }
    };

    window.addEventListener('keydown', (e) => { 
        keys[e.code] = true; 
        if (e.code === "Space" && gameActive) lasers.push({ x: playerX + 18, y: 320, isHero: true });
        if (e.code === "ShiftLeft" || e.code === "ShiftRight") activateSpecialShield();
    });
    window.addEventListener('keyup', (e) => { keys[e.code] = false; });

    function bootEngine() {
        score = 0; playerHp = 100; currentPhase = 0; playerX = 190; specialShieldTime = 0; shieldCharge = 100;
        lasers = []; enemies = []; bossActive = false; bossY = -50; bossHp = 1000;
        gameActive = true;
        
        document.getElementById('score-lbl').innerText = score;
        document.getElementById('hull-lbl').innerText = playerHp + "%";
        document.getElementById('target-lbl').innerText = "CLEAR DRONES";
        document.getElementById('target-lbl').style.color = "#ff3333";
        
        requestAnimationFrame(loop);
    }

    function activateSpecialShield() {
        if (shieldCharge < 100 || !gameActive) return;
        specialShieldTime = 180; // 3 seconds at 60fps frame loop
        shieldCharge = 0;
    }

    function loop() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Movement Physics
        if (keys['ArrowLeft'] && playerX > 5) playerX -= playerSpeed;
        if (keys['ArrowRight'] && playerX < canvas.width - 45) playerX += playerSpeed;

        // Render Shield Charging mechanics
        if (shieldCharge < 100) shieldCharge += 0.2;

        // Render Hero Ship
        ctx.font = "28px Arial";
        ctx.fillText("🚀", playerX, 345);

        // Render Special Shield Bubble Visual overlay
        if (specialShieldTime > 0) {
            specialShieldTime--;
            ctx.strokeStyle = "#ff00ff";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(playerX + 19, 330, 28, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Spawn Boss Check
        if (score >= 200 && !bossActive && currentPhase === 0) {
            bossActive = true;
            currentPhase = 1;
            document.getElementById('target-lbl').innerText = `P${currentPhase}: ${bossPhases[currentPhase].name}`;
        }

        // Lasers Logic
        ctx.fillStyle = "#00ffff";
        for (let l = lasers.length - 1; l >= 0; l--) {
            let laser = lasers[l];
            laser.y += laser.isHero ? -8 : 5;
            ctx.fillRect(laser.x, laser.y, 4, 10);

            // Delete offscreen lasers
            if (laser.y < 0 || laser.y > canvas.height) { lasers.splice(l, 1); continue; }

            // Laser hitting hero ship
            if (!laser.isHero && laser.x >= playerX && laser.x <= playerX + 35 && laser.y >= 320 && laser.y <= 350) {
                lasers.splice(l, 1);
                if (specialShieldTime <= 0) hitPlayer(15);
            }
        }

        // Boss Logic Engine Pipeline
        if (bossActive) {
            if (bossY < 35) bossY += 1;
            bossX += bossDir * (1.2 + currentPhase * 0.2);
            if (bossX < 10 || bossX > canvas.width - 90) bossDir *= -1;

            // Draw Boss
            ctx.fillStyle = bossPhases[currentPhase].color;
            ctx.fillRect(bossX, bossY, 80, 40);
            ctx.font = "24px Arial";
            ctx.fillText("🛸", bossX + 26, bossY + 28);

            // Boss Shooting Counter Attacks
            spawnTimer++;
            if (spawnTimer > Math.max(12, 35 - currentPhase * 2)) {
                lasers.push({ x: bossX + 40, y: bossY + 40, isHero: false });
                spawnTimer = 0;
            }

            // Hero lasers hitting boss
            for (let l = lasers.length - 1; l >= 0; l--) {
                let m = lasers[l];
                if (m.isHero && m.x >= bossX && m.x <= bossX + 80 && m.y >= bossY && m.y <= bossY + 40) {
                    lasers.splice(l, 1);
                    damageBoss(30);
                }
            }
        } else {
            // Standard Drone spawning logic loops
            spawnTimer++;
            if (spawnTimer > 30) {
                enemies.push({ x: Math.random() * (canvas.width - 30), y: -20, speed: 3 });
                spawnTimer = 0;
            }
        }

        // Drones Processing loops
        for (let e = enemies.length - 1; e >= 0; e--) {
            let drone = enemies[e];
            drone.y += drone.speed;
            ctx.font = "22px Arial";
            ctx.fillText("👾", drone.x, drone.y);

            // Special shield vaporizes drones instantly
            if (specialShieldTime > 0 && drone.x >= playerX - 20 && drone.x <= playerX + 50 && drone.y >= 300) {
                enemies.splice(e, 1);
                score += 20;
                document.getElementById('score-lbl').innerText = score;
                continue;
            }

            // Lasers hitting drones
            for (let l = lasers.length - 1; l >= 0; l--) {
                let m = lasers[l];
                if (m.isHero && m.x >= drone.x - 5 && m.x <= drone.x + 25 && m.y >= drone.y - 20 && m.y <= drone.y) {
                    lasers.splice(l, 1);
                    enemies.splice(e, 1);
                    score += 20;
                    document.getElementById('score-lbl').innerText = score;
                    break;
                }
            }

            // Drone crashes into hero ship
            if (drone.x >= playerX - 15 && drone.x <= playerX + 35 && drone.y >= 320 && drone.y <= 350) {
                enemies.splice(e, 1);
                if (specialShieldTime <= 0) hitPlayer(20);
            }
        }

        requestAnimationFrame(loop);
    }

    function damageBoss(amt) {
        bossHp -= amt;
        if (bossHp <= 0) { endSession(true); return; }

        let targetLvl = 11 - Math.ceil((bossHp / maxBossHp) * 10);
        if (targetLvl > currentPhase && targetLvl <= 10) {
            currentPhase = targetLvl;
            document.getElementById('target-lbl').innerText = `P${currentPhase}: ${bossPhases[currentPhase].name}`;
            document.getElementById('target-lbl').style.color = bossPhases[currentPhase].color;
        }
    }

    function hitPlayer(amt) {
        playerHp -= amt;
        if (playerHp < 0) playerHp = 0;
        document.getElementById('hull-lbl').innerText = playerHp + "%";
        if (playerHp <= 0) endSession(false);
    }

    function endSession(win) {
        gameActive = false;
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = "bold 20px monospace";
        ctx.fillStyle = win ? "#00ff66" : "#ff3333";
        ctx.fillText(win ? "VICTORY! ALL 10 PHASES CLEARED" : "STRF-01 DESTROYED", 50, 180);
    }
</script>
</body>
</html>
