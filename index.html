<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Space Shooter</title>
    <style>
        body { background: #020208; color: #00ffcc; font-family: 'Courier New', monospace; text-align: center; margin: 0; overflow: hidden; padding: 10px; }
        .arcade-cabinet { max-width: 480px; margin: 5px auto; background: #0b0c16; padding: 15px; border: 3px solid #00ffcc; box-shadow: 0 0 20px #00ffcc; border-radius: 8px; }
        
        /* High-Performance Canvas Viewport */
        #space-canvas { background: #000003; display: block; margin: 10px auto; border: 2px solid #333; box-shadow: inset 0 0 20px #000; }
        
        .hud-display { display: flex; justify-content: space-between; background: #111424; padding: 8px; border: 1px solid #00ffcc; font-size: 13px; font-weight: bold; }
        .btn-play { background: #ff00ff; color: white; border: 2px solid white; padding: 10px 25px; font-size: 14px; font-weight: bold; font-family: 'Courier New', monospace; cursor: pointer; margin-top: 5px; box-shadow: 0 0 10px #ff00ff; }
        .btn-play:hover { background: #00ffcc; color: black; box-shadow: 0 0 15px #00ffcc; }
    </style>
</head>
<body>

<div class="arcade-cabinet">
    <div style="font-size: 20px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 8px #00ffcc;">☄️ COSMIC INTERCEPTOR ☄️</div>
    
    <!-- Real-time HUD stats -->
    <div class="hud-display">
        <div>THREAT PHASE: <span id="threat-lbl" style="color:#ffff00;">1</span></div>
        <div>SCORE: <span id="score-lbl" style="color:#00ff66;">0</span></div>
        <div>HULL: <span id="hull-lbl" style="color:#ff3333;">100%</span></div>
    </div>

    <!-- The Active Graphics Canvas -->
    <canvas id="space-canvas" width="440" height="360"></canvas>

    <button class="btn-play" onclick="startSpaceGame()">LAUNCH STRF-01</button>
    <div style="font-size: 11px; color: #667799; margin-top: 8px; font-weight: bold;">
        CONTROLS: Use [◀ LEFT] & [RIGHT ▶] Arrow Keys to Fly. Press [SPACEBAR] to Fire Lasers!
    </div>
</div>

<script>
    const canvas = document.getElementById('space-canvas');
    const ctx = canvas.getContext('2d');

    // Engine Core Variables
    let gameRunning = false, score = 0, playerHp = 100, currentPhase = 1;
    let playerX = 200, playerSpeed = 7;
    let keysPressed = {};
    let laserMagazine = [], alienSwarm = [];
    let enemySpawnTimer = 0, enemySpeedMultiplier = 2;

    // Keyboard Listener Triggers
    window.addEventListener('keydown', (e) => { keysPressed[e.code] = true; if(e.code === "Space" && gameRunning) fireLaserBeam(); });
    window.addEventListener('keyup', (e) => { keysPressed[e.code] = false; });

    function startSpaceGame() {
        // Reset state variables definitions
        score = 0; playerHp = 100; currentPhase = 1; enemySpeedMultiplier = 2; playerX = 200;
        laserMagazine = []; alienSwarm = [];
        gameRunning = true;
        
        document.getElementById('score-lbl').innerText = score;
        document.getElementById('hull-lbl').innerText = playerHp + "%";
        document.getElementById('threat-lbl').innerText = currentPhase;
        
        // Execute graphics render engine pathway frame loops
        requestAnimationFrame(runGameEngineLoop);
    }

    function fireLaserBeam() {
        // Instantiate real projectile vector coordinates
        laserMagazine.push({ x: playerX + 18, y: 320, speed: 8 });
    }

    function spawnAlienUnit() {
        // Calculate random generation coordinate slots
        const spawnX = Math.floor(Math.random() * (canvas.width - 30));
        let typeChance = Math.random();
        let entitySymbol = "🛸";
        let isHeavy = false;

        if (typeChance > 0.8 && currentPhase >= 3) {
            entitySymbol = "🛰️"; // Heavy armored alien node
            isHeavy = true;
        } else if (typeChance < 0.15 && currentPhase >= 6) {
            entitySymbol = "👾"; // Elite flagship drone
        }

        alienSwarm.push({ x: spawnX, y: -20, speed: (Math.random() * 1.5 + 1) * enemySpeedMultiplier, unit: entitySymbol, heavy: isHeavy });
    }

    function runGameEngineLoop() {
        if (!gameRunning) return;

        // Clear viewscreen buffer frame step clears
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Render ambient scrolling space grid background stars
        ctx.fillStyle = "rgba(255,255,255,0.15)";
        for(let i=0; i<15; i++) {
            let starY = (Date.now() / 10 + i * 45) % canvas.height;
            ctx.fillRect((i * 37) % canvas.width, starY, 2, 2);
        }

        // Process player structural motion pathings ticks
        if (keysPressed['ArrowLeft'] && playerX > 5) playerX -= playerSpeed;
        if (keysPressed['ArrowRight'] && playerX < canvas.width - 45) playerX += playerSpeed;

        // Draw Player Starfighter Sprite Model
        ctx.font = "32px Arial";
        ctx.fillText("🚀", playerX, 345);

        // Process and Render Player Weapon Laser Cells Arrays
        ctx.fillStyle = "#00ffcc";
        for (let l = laserMagazine.length - 1; l >= 0; l--) {
            let beam = laserMagazine[l];
            beam.y -= beam.speed;
            ctx.fillRect(beam.x, beam.y, 4, 12);
            
            // Delete out-of-bounds index nodes sweeps
            if (beam.y < 0) laserMagazine.splice(l, 1);
        }

        // Process and Render Alien Enemy Vectors Ticks Pipeline
        enemySpawnTimer++;
        if (enemySpawnTimer > Math.max(15, 45 - currentPhase * 3)) {
            spawnAlienUnit();
            enemySpawnTimer = 0;
        }

        for (let a = alienSwarm.length - 1; a >= 0; a--) {
            let drone = alienSwarm[a];
            drone.y += drone.speed;
            
            ctx.font = "26px Arial";
            ctx.fillText(drone.unit, drone.x, drone.y);

            // Collisions Framework checking intersections coordinates overlaps
            // 1. Lasers hitting Aliens
            for (let l = laserMagazine.length - 1; l >= 0; l--) {
                let beam = laserMagazine[l];
                if (beam.x >= drone.x && beam.x <= drone.x + 26 && beam.y >= drone.y - 20 && beam.y <= drone.y) {
                    laserMagazine.splice(l, 1);
                    
                    if (drone.heavy) {
                        drone.heavy = false; // Armor broken indicator mapping configuration status
                        drone.unit = "🛸";
                    } else {
                        alienSwarm.splice(a, 1);
                        score += 15;
                        document.getElementById('score-lbl').innerText = score;
                        evaluateThreatLevel();
                    }
                    break;
                }
            }

            // 2. Aliens colliding into Player hull bounds
            if (drone.x >= playerX - 15 && drone.x <= playerX + 35 && drone.y >= 315 && drone.y <= 350) {
                alienSwarm.splice(a, 1);
                playerHp -= 20;
                document.getElementById('hull-lbl').innerText = playerHp + "%";
                if (playerHp <= 0) terminateMissionSession();
            }

            // Boundary baseline floor sweeps drop cleanups
            if (drone.y > canvas.height) {
                alienSwarm.splice(a, 1);
                playerHp -= 5; // Structural hull penalty for missing sector threats
                document.getElementById('hull-lbl').innerText = Math.max(0, playerHp) + "%";
                if (playerHp <= 0) terminateMissionSession();
            }
        }

        requestAnimationFrame(runGameEngineLoop);
    }

    function evaluateThreatLevel() {
        // Automatically steps difficulty scales configurations dynamically every 150 points up to 10
        let targetPhase = Math.floor(score / 150) + 1;
        if (targetPhase > currentPhase && targetPhase <= 10) {
            currentPhase = targetPhase;
            enemySpeedMultiplier += 0.45; // Incremental layout tracking adjustments
            document.getElementById('threat-lbl').innerText = currentPhase;
        }
    }

    function terminateMissionSession() {
        gameRunning = false;
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#ff3333";
        ctx.font = "bold 24px 'Courier New'";
        ctx.fillText("MISSION DESTROYED", 100, 160);
        ctx.fillStyle = "#ffffff";
        ctx.font = "14px 'Courier New'";
        ctx.fillText(`FINAL SCORE: ${score} | TERMINAL PHASE: ${currentPhase}`, 85, 200);
    }
</script>
</body>
</html>
