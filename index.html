<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Neon Gauntlet</title>
    <style>
        body { background: #03010a; color: #ff00ff; font-family: 'Impact', sans-serif; text-align: center; margin: 0; padding: 15px; overflow: hidden; user-select: none; }
        .arcade-container { max-width: 440px; margin: 0 auto; background: #0c051c; border: 4px solid #ff00ff; box-shadow: 0 0 20px #ff00ff; padding: 15px; border-radius: 12px; position: relative; }
        
        /* Tactical Combat Matrix Grid */
        .combat-arena { position: relative; width: 100%; height: 260px; background: #060210; border: 2px solid #00ffff; box-shadow: inset 0 0 15px rgba(0,255,255,0.3); margin: 10px 0; overflow: hidden; }
        
        /* Shifting Boss Head Model Frame */
        #boss-avatar { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-size: 70px; text-shadow: 0 0 20px #ff0000; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 5; }
        
        /* Real-Time Pulse Targets */
        .strike-node { position: absolute; width: 55px; height: 55px; background: #00ffff; border: 3px solid #fff; border-radius: 50%; font-size: 24px; line-height: 55px; text-align: center; cursor: pointer; box-shadow: 0 0 15px #00ffff; z-index: 10; transform: scale(1); transition: transform 0.1s; }
        .strike-node:active { transform: scale(0.85); }
        
        /* Special Ability Battery Controls */
        .hud-grid { display: flex; justify-content: space-between; margin-bottom: 5px; font-family: monospace; font-size: 11px; font-weight: bold; }
        .hud-panel { background: #14072b; border: 1px solid #ff00ff; padding: 6px; width: 46%; text-align: left; }
        .meter { background: #221133; width: 100%; height: 12px; border: 1px solid #fff; margin-top: 4px; overflow: hidden; }
        .fill { height: 100%; width: 100%; transition: width 0.15s; }
        
        .btn-overdrive { width: 100%; background: #ff00ff; color: #fff; border: 2px solid #fff; padding: 12px; font-size: 15px; font-weight: bold; font-family: 'Impact'; cursor: pointer; text-shadow: 1px 1px 0 #000; box-shadow: 0 0 10px #ff00ff; margin-top: 5px; }
        .btn-overdrive:disabled { background: #442244; color: #888; border-color: #666; box-shadow: none; cursor: not-allowed; }
        .btn-start { background: #00ffff; color: #000; border: 2px solid #fff; padding: 12px 35px; font-size: 16px; font-weight: bold; font-family: 'Impact'; cursor: pointer; margin-top: 5px; box-shadow: 0 0 10px #00ffff; }
    </style>
</head>
<body>

<div class="arcade-container">
    <div style="font-size: 22px; color: #00ffff; text-shadow: 2px 2px 0 #ff00ff; letter-spacing: 1px;">⚡ CYBER STRIKE MATRIX ⚡</div>
    
    <!-- Status Dashboard -->
    <div class="hud-grid">
        <div class="hud-panel" style="border-color:#00ff00;">
            <div style="color:#00ff00;">PLAYER SIGNAL</div>
            <div class="meter"><div id="p-fill" class="fill" style="background:#00ff00;"></div></div>
            <div id="p-lbl" style="margin-top:3px;">HP: 100/100</div>
        </div>
        <div class="hud-panel" style="border-color:#ff3333;">
            <div id="b-name" style="color:#ff3333;">P1: GLARING SENTINEL</div>
            <div class="meter"><div id="b-fill" class="fill" style="background:#ff3333;"></div></div>
            <div id="b-lbl" style="margin-top:3px;">CORE: 1500/1500</div>
        </div>
    </div>

    <!-- Active Clicking Area Box -->
    <div class="combat-arena" id="arena">
        <!-- Giant locked Angry Face Boss Model -->
        <div id="boss-avatar">😠</div>
    </div>

    <!-- Special Ability Charge Slot -->
    <button id="od-btn" class="btn-overdrive" onclick="activateSpecialOverdrive()" disabled>OVERDRIVE CORE: 0% [CHARGE AT 100%]</button>
    <button id="start-btn" class="btn-start" onclick="runNeonEngine()">INITIALIZE MATCH</button>
</div>

<script>
    const arena = document.getElementById('arena');
    let gameRunning = false, playerHp = 100, currentPhase = 1;
    let bossHp = 1500, maxBossHp = 1500;
    let odCharge = 0, overdriveActive = false, overdriveTimer = 0;
    let loopClock, targetSpawnClock;

    // Phase tracking database keeping the boss angry face locked in but changing fury attributes
    const phases = {
        1: { name: "Glaring Sentinel", face: "😠", color: "#33ff33", dmg: 4, speed: 1200 },
        2: { name: "Irritated Overlord", face: "😠", color: "#00ffff", dmg: 6, speed: 1100 },
        3: { name: "Aggressive Matrix", face: "😡", color: "#00aaff", dmg: 9, speed: 1000 },
        4: { name: "Furious Mainframe", face: "😡", color: "#a000ff", dmg: 12, speed: 950 },
        5: { name: "Raging Core Unit", face: "🤬", color: "#ff00ff", dmg: 15, speed: 900 },
        6: { name: "Berserk Firewall", face: "🤬", color: "#ff0066", dmg: 18, speed: 850 },
        7: { name: "Vengeful AI Core", face: "危害", color: "#ff3300", dmg: 22, speed: 800 },
        8: { name: "Demonic Singularity", face: "👿", color: "#ffff00", dmg: 26, speed: 750 },
        9: { name: "Doomsday Malfunction", face: "👹", color: "#ffffff", dmg: 30, speed: 700 },
        10: { name: "Omega Lord of Fury", face: "👺", color: "#ff0000", dmg: 35, speed: 600 }
    };

    function runNeonEngine() {
        // Clear runtime state
        playerHp = 100; bossHp = 1500; currentPhase = 1; odCharge = 0; overdriveActive = false;
        document.getElementById('start-btn').style.display = "none";
        
        // Wipe old active nodes
        const activeNodes = document.querySelectorAll('.strike-node');
        activeNodes.forEach(n => n.remove());
        
        const oldScreen = document.getElementById('end-screen');
        if (oldScreen) oldScreen.remove();
        
        gameRunning = true;
        syncHUD();
        
        // Active Core Processing loops
        loopClock = setInterval(engineTick, 50);
        triggerTargetSpawnTimer();
        spawnCombatNode(); // Spawn initial node immediately
    }

    function triggerTargetSpawnTimer() {
        clearInterval(targetSpawnClock);
        if (!gameRunning) return;
        
        let spawnRate = overdriveActive ? 300 : phases[currentPhase].speed;
        targetSpawnClock = setInterval(spawnCombatNode, spawnRate);
    }

    function spawnCombatNode() {
        if (!gameRunning) return;
        
        // Remove old nodes to prevent clutter
        const existingNode = document.querySelector('.strike-node');
        if (existingNode) {
            existingNode.remove();
            if (!overdriveActive) hitPlayer(phases[currentPhase].dmg);
        }

        const node = document.createElement('div');
        node.className = 'strike-node';
        node.innerText = "⚔️";
        
        // Random placement parameters
        let maxW = arena.clientWidth - 65;
        let maxH = arena.clientHeight - 130;
        
        node.style.left = Math.floor(Math.random() * maxW + 5) + 'px';
        node.style.top = Math.floor(Math.random() * maxH + 110) + 'px';
        
        node.onmousedown = (e) => {
            e.preventDefault();
            node.remove();
            
            let strikePower = overdriveActive ? 65 : 40;
            damageBoss(strikePower);
            
            if (odCharge < 100 && !overdriveActive) {
                odCharge = Math.min(100, odCharge + 10);
                updateODButton();
            }
            spawnCombatNode();
        };

        arena.appendChild(node);
    }

    function activateSpecialOverdrive() {
        if (odCharge < 100 || overdriveActive) return;
        overdriveActive = true;
        overdriveTimer = 60; 
        document.getElementById('od-btn').style.background = "#ffff00";
        document.getElementById('od-btn').style.color = "#000";
        document.getElementById('boss-avatar').style.transform = "translateX(-50%) scale(0.8)";
        triggerTargetSpawnTimer();
    }

    function engineTick() {
        if (!gameRunning) return;

        if (overdriveActive) {
            overdriveTimer--;
            document.getElementById('od-btn').innerText = `OVERDRIVE CORE ACTIVE: ${Math.ceil(overdriveTimer/20)}s`;
            if (overdriveTimer <= 0) {
                overdriveActive = false;
                odCharge = 0;
                updateODButton();
                document.getElementById('boss-avatar').style.transform = "translateX(-50%) scale(1)";
                triggerTargetSpawnTimer();
            }
        }
    }

    function damageBoss(amt) {
        bossHp -= amt;
        if (bossHp <= 0) { bossHp = 0; resolveMatch(true); return; }

        let theoreticalPhase = 11 - Math.ceil((bossHp / maxBossHp) * 10);
        if (theoreticalPhase > currentPhase && theoreticalPhase <= 10) {
            currentPhase = theoreticalPhase;
            triggerTargetSpawnTimer(); 
        }
        syncHUD();
    }

    function hitPlayer(amt) {
        playerHp -= amt;
        if (playerHp < 0) playerHp = 0;
        syncHUD();
        
        arena.style.borderColor = "#ff0000";
        setTimeout(() => arena.style.borderColor = "#00ffff", 100);

        if (playerHp <= 0) resolveMatch(false);
    }

    function updateODButton() {
        const btn = document.getElementById('od-btn');
        btn.disabled = odCharge < 100;
        if (odCharge >= 100) {
            btn.innerText = "⚡ UNLEASH OVERDRIVE CORE [READY]";
            btn.style.background = "#ff00ff";
            btn.style.color = "#fff";
        } else {
            btn.innerText = `OVERDRIVE CORE: ${odCharge}% [CHARGE AT 100%]`;
            btn.style.background = "#442244";
            btn.style.color = "#888";
        }
    }

    function syncHUD() {
        document.getElementById('p-fill').style.width = Math.max(0, playerHp) + "%";
        document.getElementById('p-lbl').innerText = `HP: ${playerHp}/100`;
