<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cosmic Dodger — Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#04040a;--panel:#0f1222;--accent:#ff4081;--accent2:#00e6b8;--muted:#9aa3b2;--gold:#ffd700}
    html,body{height:100%;margin:0;background:linear-gradient(180deg,#02020a 0%, #05112a 60%, #071026 100%);font-family:'Orbitron',sans-serif;color:var(--accent2);-webkit-font-smoothing:antialiased}
    #game-box{width:100%;max-width:980px;margin:18px auto;padding:18px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(0,0,0,0.06));box-shadow:0 6px 30px rgba(1,1,6,0.5);border:1px solid rgba(0,230,184,0.08)}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px}
    h1#title{cursor:pointer;margin:0;color:var(--accent2);font-size:22px;display:flex;align-items:center;gap:8px}
    .controls-top{display:flex;gap:8px;align-items:center}
    .icon-btn{background:transparent;border:1px solid rgba(255,255,255,0.04);padding:6px 8px;border-radius:8px;color:var(--muted);cursor:pointer;font-weight:700;transition:all 0.2s}
    .icon-btn:hover{background:rgba(255,64,129,0.1);color:var(--accent)}
    .hud{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
    .hud .left,.hud .center,.hud .right{flex:1}
    .hud .center{text-align:center;font-size:14px;color:var(--gold);font-weight:700}
    .hud .left{font-size:13px;color:var(--accent2)}
    .hud .right{font-size:13px;color:#ff7bd6;text-align:right}
    canvas{display:block;margin:12px auto;border-radius:10px;background:transparent;box-shadow:0 6px 18px rgba(0,0,0,0.6);outline:none;border:2px solid rgba(255,64,129,0.08)}
    .sub{color:var(--muted);font-size:12px;margin-top:6px}
    .overlay{position:absolute;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
    .panel{pointer-events:auto;background:linear-gradient(180deg,rgba(10,12,20,.98),rgba(6,8,12,.95));padding:18px;border-radius:12px;color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.8);min-width:260px;max-height:70vh;overflow-y:auto}
    .panel h2{margin:0 0 8px 0;font-size:20px;color:var(--accent)}
    .btn{background:linear-gradient(90deg,var(--accent),#ffea00);border:none;padding:10px 16px;border-radius:8px;font-weight:700;color:#05060a;cursor:pointer;margin-top:8px;transition:all 0.2s}
    .btn:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(255,64,129,0.4)}
    .btn:active{transform:scale(0.98)}
    .small{font-size:12px;color:var(--muted);margin-top:6px}
    @media (max-width:700px){canvas{width:92vw;height:92vw;max-height:92vh}.controls{display:flex;justify-content:space-between;gap:8px}.touch-btn{flex:1;padding:12px;border-radius:10px;background:rgba(255,64,129,0.2);border:1px solid rgba(255,64,129,0.4);color:var(--accent2);font-weight:700;cursor:pointer}}
    .floating{position:absolute;pointer-events:none;transform:translate(-50%,-50%);white-space:nowrap}
    .achievement{position:fixed;left:20px;top:20px;background:rgba(0,0,0,0.6);padding:8px 12px;border-radius:8px;color:#fff;border:1px solid rgba(255,255,255,0.03);animation:slideInOut 4.2s ease-in-out}
    @keyframes slideInOut{0%{transform:translateX(-100%);opacity:0}10%{transform:translateX(0);opacity:1}90%{transform:translateX(0);opacity:1}100%{transform:translateX(-100%);opacity:0}}
    .shop-grid{display:flex;flex-direction:column;gap:10px}
    .shop-item{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.02);padding:8px;border-radius:8px}
    .leaderboard{max-height:280px;overflow-y:auto}
    .lb-row{display:flex;justify-content:space-between;padding:6px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px}
    .lb-row.top3{background:rgba(255,215,0,0.08)}
    .lb-rank{color:var(--gold);font-weight:700;min-width:30px}
    .lb-name{flex:1;color:var(--accent2)}
    .lb-score{color:#ff7bd6;text-align:right}
    .stat-bar{background:rgba(255,255,255,0.05);height:8px;border-radius:4px;margin:4px 0;overflow:hidden}
    .stat-fill{height:100%;background:linear-gradient(90deg,var(--accent),#ffea00);border-radius:4px}
    .loading-spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="game-box">
    <header>
      <h1 id="title"><span class="logo">🌌</span> Cosmic Dodger — Premium</h1>
      <div class="controls-top">
        <button id="muteBtn" class="icon-btn">🔊</button>
        <button id="fsBtn" class="icon-btn">⤢</button>
        <button id="shopBtn" class="icon-btn">🏪 Shop</button>
        <button id="lbBtn" class="icon-btn">🏆 Global</button>
      </div>
    </header>

    <div class="hud">
      <div class="left" id="player-hud">PLAYER: READY</div>
      <div class="center" id="score-hud">SCORE: 0  ×1</div>
      <div class="right" id="ai-hud">AI: ALPHA</div>
    </div>

    <div style="position:relative">
      <canvas id="canvas" width="900" height="900" tabindex="1"></canvas>
      <div id="overlay" class="overlay" style="display:none"><div class="panel" id="panel"></div></div>
    </div>

    <div class="sub">Collect power-ups, chain combos, and defeat bosses. Mobile controls shown on small screens.</div>

    <div class="controls" id="touch-controls" style="display:none">
      <button class="touch-btn" id="btn-left">◀</button>
      <button class="touch-btn" id="btn-fire">●</button>
      <button class="touch-btn" id="btn-right">▶</button>
    </div>
  </div>

  <div id="achievementBox" class="achievement" style="display:none"></div>

<script>
// ----------------------------- Config / Shop keys -----------------------------
const SHOP_KEYS = { USER: 'dodger_user', OWNED: 'dodger_owned', POINTS: 'dodger_points', XP:'dodger_xp', LEVEL:'dodger_level', LEADER:'dodger_leader' };
let shopOwned = JSON.parse(localStorage.getItem(SHOP_KEYS.OWNED) || '[]');
let shopUser = JSON.parse(localStorage.getItem(SHOP_KEYS.USER) || 'null');
let shopPoints = Number(localStorage.getItem(SHOP_KEYS.POINTS) || 0);
let playerXP = Number(localStorage.getItem(SHOP_KEYS.XP) || 0);
let playerLevel = Number(localStorage.getItem(SHOP_KEYS.LEVEL) || 1);

// Achievements & leaderboard
const ACH_KEY = 'dodger_achievements';
let achievements = JSON.parse(localStorage.getItem(ACH_KEY) || '[]');
function unlockAchievement(id, title){ if (!achievements.includes(id)){ achievements.push(id); localStorage.setItem(ACH_KEY, JSON.stringify(achievements)); showAchievement(title); } }
function showAchievement(text){ const el = document.getElementById('achievementBox'); el.innerText = '⭐ ' + text; el.style.display = 'block'; setTimeout(()=>el.style.display='none', 4200); }

// Expose username globally for HUD
window.dodgerUser = shopUser;

// ----------------------------- Canvas & audio -----------------------------
const cvs = document.getElementById('canvas'); const ctx = cvs.getContext('2d');
resizeCanvas(); window.addEventListener('resize', resizeCanvas);
function resizeCanvas(){ const ratio = window.devicePixelRatio || 1; const size = Math.min(1100, Math.max(640, Math.floor(Math.min(window.innerWidth*0.9, 980)))); cvs.width = size * ratio; cvs.height = size * ratio; ctx.scale(ratio, ratio); }

let audioCtx, masterGain, musicNode; let muted = false; function ensureAudio(){ if (!audioCtx){ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination); masterGain.gain.value = 0.07; } }
function toggleMute(){ muted = !muted; if (masterGain) masterGain.gain.value = muted ? 0 : 0.07; document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊'; }
function startMusic(){ try{ const o1 = audioCtx.createOscillator(); const o2 = audioCtx.createOscillator(); const g = audioCtx.createGain(); o1.type='sine'; o2.type='sine'; o1.frequency.value = 110; o2.frequency.value = 165; o1.connect(g); o2.connect(g); g.connect(masterGain); g.gain.value = 0.02; o1.start(); o2.start(); o1.stop(audioCtx.currentTime + 999999); o2.stop(audioCtx.currentTime + 999999); }catch(e){} }
function sfx(type,pitch=1,when=0){ try{ ensureAudio(); const t = audioCtx.currentTime + when; if (type==='shoot'){ const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='sawtooth'; o.frequency.value=180*pitch; o.connect(g); g.connect(masterGain); g.gain.setValueAtTime(0.04,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.1); o.start(t); o.stop(t+0.1); } else if(type==='hit'){ const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.type='sine'; o.frequency.setValueAtTime(200*pitch,t); o.frequency.exponentialRampToValueAtTime(80*pitch,t+0.15); o.connect(g); g.connect(masterGain); g.gain.setValueAtTime(0.05,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.15); o.start(t); o.stop(t+0.15); } }catch(e){} }

// ----------------------------- Game state -----------------------------
const DIFFICULTY = {
  astBase: 18,
  ftrBase: 140,
  astScoreScale: 180,
  ftrScoreScale: 24,
  enemyHpBase: 3,
  enemySpeedBase: 2.6,
  bossHpMultiplier: 1.5,
  pickupFreqMultiplier: 1.3
};

let score = 0, multiplier = 1, comboTimer = 0, frame = 0, isOver = true, running = false;
let asteroids = [], enemies = [], lasers = [], bullets = [], pickups = [], particles = [], floats = [];
let activeBoss = null, bossStage = 0, wave = 0; let chaosMode = false;
const keys = { left:false, right:false, fire:false, shift:false };

// Player and allies with enhanced AI state
const player = { x: 450, y: 820, w:28, h:24, speed:7.2, cooldown:0, rate:10, health:1, lives:3, shield:0, shieldTimer:0, spread:false, rapid:false, skin:'default' };
const aiAlpha = { x: 160, y: 820, w:24, h:20, speed:4.8, cooldown:0, alive:true, respawn:0, moveDir:1, moveTimer:0 };
const aiBeta = { x: 560, y: 820, w:24, h:20, speed:5.6, cooldown:0, alive:false, respawn:0, moveDir:1, moveTimer:0 };
const aiGamma = { x: 360, y: 820, w:20, h:18, speed:6, cooldown:0, alive:false, respawn:0, moveDir:1, moveTimer:0 };

function applyShopOwned(){ shopOwned = JSON.parse(localStorage.getItem(SHOP_KEYS.OWNED) || '[]'); if (shopOwned.includes('rapid_fire')){ player.rate = Math.max(6, player.rate * 0.7); player.rapid = true; } if (shopOwned.includes('shield_gen')){ player.shield = 1; } if (shopOwned.includes('spread_shot')){ player.spread = true; } }
applyShopOwned();

const overlay = document.getElementById('overlay'); const panel = document.getElementById('panel'); const title = document.getElementById('title'); const scoreHud = document.getElementById('score-hud'); const playerHud = document.getElementById('player-hud'); const aiHud = document.getElementById('ai-hud');

const btnLeft = document.getElementById('btn-left'); const btnRight = document.getElementById('btn-right'); const btnFire = document.getElementById('btn-fire');
if (btnLeft){ btnLeft.addEventListener('touchstart', ()=>keys.left=true); btnLeft.addEventListener('touchend', ()=>keys.left=false); }
if (btnRight){ btnRight.addEventListener('touchstart', ()=>keys.right=true); btnRight.addEventListener('touchend', ()=>keys.right=false); }
if (btnFire){ btnFire.addEventListener('touchstart', ()=>keys.fire=true); btnFire.addEventListener('touchend', ()=>keys.fire=false); }

window.addEventListener('keydown',(e)=>{ if (e.key==='ArrowLeft'){ e.preventDefault(); keys.left=true; } if (e.key==='ArrowRight'){ e.preventDefault(); keys.right=true; } if (e.key===' '){ e.preventDefault(); keys.fire=true; } if (e.key==='Shift') keys.shift=true; });
window.addEventListener('keyup',(e)=>{ if (e.key==='ArrowLeft') keys.left=false; if (e.key==='ArrowRight') keys.right=false; if (e.key===' ') keys.fire=false; if (e.key==='Shift') keys.shift=false; });

let clickCount = 0;
title.addEventListener('click',(e)=>{
  if (keys.shift){
    clickCount++;
    const allowed = ['the first player 1','bestie','dude','moo moo cow','okay'];
    const name = (shopUser && shopUser.name) ? String(shopUser.name).toLowerCase().trim() : '';
    if (clickCount>=3){
      clickCount = 0;
      if (allowed.includes(name)){
        if (!shopOwned.includes('cheat_drone')){ shopOwned.push('cheat_drone'); localStorage.setItem(SHOP_KEYS.OWNED, JSON.stringify(shopOwned)); }
        aiBeta.alive=true; aiBeta.x = player.x + 40; aiBeta.respawn=0;
        aiGamma.alive=true; aiGamma.x = player.x - 40; aiGamma.respawn=0;
        alert('Cheat mode enabled for "' + (shopUser && shopUser.name?shopUser.name:'authorized player') + '" (local only).');
        if (isOver) startGame();
      } else {
        alert('Cheat mode is restricted. Only players titled "the First player" or "bestie" can enable it.');
      }
    }
  } else {
    clickCount=0;
    if (isOver) startGame();
  }
});

// ----------------------------- Gameplay helpers -----------------------------
function spawnAsteroid(){ const W = cvs.width/(window.devicePixelRatio||1); asteroids.push({ x: Math.random()*(W-40), y:-30-Math.random()*80, size:18+Math.random()*46, speed:(chaosMode?3.2:2.6)+Math.random()*3.2, spin:Math.random()*0.08-0.04, rot:0 }); }
function spawnEnemy(){ const W = cvs.width/(window.devicePixelRatio||1); enemies.push({ x:Math.random()*(W-36), y:-20, size:18, hp: (chaosMode?4: DIFFICULTY.enemyHpBase + Math.floor(Math.random()*2)), speed:(chaosMode?2.8:DIFFICULTY.enemySpeedBase) + Math.random()*1.2, cooldown: 60+Math.random()*80 }); }
function spawnPickup(x,y){ const types=['rapid','shield','spread','bomb','score','homing']; const t=types[Math.floor(Math.random()*types.length)]; pickups.push({ x,y,type:t,vy:1.2,t:t }); }
function spawnParticles(x,y,color,count=18,spread=2){ for(let i=0;i<count;i++){ const a=Math.random()*Math.PI*2; const s=Math.random()*spread+0.6; particles.push({ x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:100,color:color }); } }
function showFloating(txt,x,y,color='#fff'){ floats.push({txt,x,y,color,alpha:1,life:90}); }
function rectHit(aX,aY,aW,aH,bX,bY,bW,bH){ return aX < bX + bW && aX + aW > bX && aY < bY + bH && aY + aH > bY; }

function updateHUD(){ scoreHud.innerText = `SCORE: ${score}  ×${Math.floor(multiplier*100)/100} ${shopUser && shopUser.name? '• ' + shopUser.name : ''}`; playerHud.innerText = `LIVES: ${player.lives} | XP: ${Math.floor(playerXP)} (Lvl ${playerLevel})`; aiHud.innerText = `DRONES: ${[aiAlpha,aiBeta,aiGamma].filter(a=>a.alive).length} | WAVE: ${wave}`; }

function startGame(){ ensureAudio(); score=0; multiplier=1; comboTimer=0; frame=0; isOver=false; running=true; asteroids=[]; enemies=[]; lasers=[]; bullets=[]; pickups=[]; particles=[]; floats.length=0; activeBoss=null; bossStage=0; wave=1; respawnPlayer(); startMusic(); }

function respawnPlayer(){ const W = cvs.width/(window.devicePixelRatio||1); const H = cvs.height/(window.devicePixelRatio||1); player.x=W/2 - player.w/2; player.y=H-100; player.cooldown=0; player.invul=120; player.shieldTimer=0; }

function endGame(){ isOver=true; running=false; overlay.style.display='flex'; saveScore(); panel.innerHTML=`<h2>💥 MISSION FAILED 💥</h2><div>Final Score: <strong>${score}</strong></div><div style="margin-top:10px;font-size:12px">Level: ${playerLevel} | XP: ${Math.floor(playerXP)}</div><button class="btn" onclick="location.reload()">Play Again</button><button class="btn" onclick="openLeaderboard()">View Global Scores</button>`; }

function maybeSpawnBoss(){ if (!activeBoss){ if (score > (chaosMode?800:350) && bossStage===0){ bossStage=1; spawnBoss(1);} else if (score > (chaosMode?2200:900) && bossStage===1){ bossStage=2; spawnBoss(2); } else if (score > (chaosMode?4000:1500) && bossStage===2){ bossStage=3; spawnBoss(3); wave++; } } }
function spawnBoss(type){ const W = cvs.width/(window.devicePixelRatio||1); if (type===1) activeBoss={name:'VANGUARD',x:120,y:-120,w:160,h:46,hp:Math.floor(140 * DIFFICULTY.bossHpMultiplier),maxHp:Math.floor(140 * DIFFICULTY.bossHpMultiplier),cooldown:40,pattern:0,patternTimer:0}; else if(type===2) activeBoss={name:'SENTINEL',x:W/2-80,y:-120,w:160,h:40,hp:Math.floor(220 * DIFFICULTY.bossHpMultiplier),maxHp:Math.floor(220 * DIFFICULTY.bossHpMultiplier),cooldown:30,pattern:0,patternTimer:0}; else if(type===3) activeBoss={name:'OMEGA',x:W/2-100,y:-140,w:200,h:50,hp:Math.floor(300 * DIFFICULTY.bossHpMultiplier),maxHp:Math.floor(300 * DIFFICULTY.bossHpMultiplier),cooldown:25,pattern:0,patternTimer:0}; }

// ----------------------------- Main loop -----------------------------
function loop(){ if(!running) return; frame++; drawBackground(); const W = cvs.width/(window.devicePixelRatio||1); const H = cvs.height/(window.devicePixelRatio||1);
  const astRate = Math.max(5, Math.floor(DIFFICULTY.astBase - Math.floor(score / DIFFICULTY.astScoreScale))); const ftrRate = Math.max(70, Math.floor(DIFFICULTY.ftrBase - Math.floor(score / DIFFICULTY.ftrScoreScale)));
  if(frame % astRate === 0) spawnAsteroid(); if(frame % ftrRate === 0) spawnEnemy(); maybeSpawnBoss();

  if(player.cooldown>0)player.cooldown--; if(keys.left && player.x>4) player.x -= player.speed; if(keys.right && player.x < (W-player.w-4)) player.x += player.speed;
  if(keys.fire && player.cooldown <= 0){ shotFrom(player.x+player.w/2, player.y, '#00e6b8', 1, true); player.cooldown = player.rate; sfx('shoot'); } if(player.invul>0)player.invul--; if(player.shieldTimer>0)player.shieldTimer--;

  drawPlayer(player);
  aiTick(aiAlpha,1); if(aiBeta.alive) aiTick(aiBeta,0.9,true); if(aiGamma.alive) aiTick(aiGamma,0.85,false,true);

  // lasers
  for(let i=lasers.length-1;i>=0;i--){ const l=lasers[i]; l.y -= l.vy; ctx.fillStyle=l.color; ctx.fillRect(l.x-2,l.y-12,4,12);
    for(let j=enemies.length-1;j>=0;j--){ if(rectHit(l.x-4,l.y-12,8,12,enemies[j].x,enemies[j].y,enemies[j].size,enemies[j].size)){ enemies[j].hp -= l.dmg; spawnParticles(l.x,l.y,'#ffcc66',8,2); lasers.splice(i,1); if(enemies[j].hp<=0){ score += 50 * multiplier; playerXP += 8; comboTimer = 90; multiplier = Math.min(4, multiplier + 0.08); sfx('hit'); spawnPickup(enemies[j].x, enemies[j].y); enemies.splice(j,1); } break; } }
    for(let j=asteroids.length-1;j>=0;j--){ if(rectHit(l.x-4,l.y-12,8,12,asteroids[j].x,asteroids[j].y,asteroids[j].size,asteroids[j].size)){ score += 8 * multiplier; playerXP += 2; comboTimer = 90; multiplier = Math.min(4, multiplier + 0.02); spawnParticles(l.x,l.y,'#ff9933',12,1.5); lasers.splice(i,1); asteroids.splice(j,1); break; } }
    if(activeBoss && rectHit(l.x-4,l.y-12,8,12,activeBoss.x,activeBoss.y,activeBoss.w,activeBoss.h)){ activeBoss.hp -= l.dmg * (shopOwned.includes('rapid_fire')?1.4:1); spawnParticles(l.x,l.y,'#00bfff',10,2); lasers.splice(i,1); if(activeBoss.hp<=0){ score += 400 * multiplier; playerXP += 80; multiplier = Math.min(4, multiplier + 0.2); unlockAchievement('boss_'+bossStage, activeBoss.name+' Defeated!'); spawnParticles(activeBoss.x,activeBoss.y,'#ffea00',40,3); activeBoss=null; bossStage++; } break; }
    if(l.y < -30) lasers.splice(i,1);
  }

  // enemy bullets
  for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i]; b.x+=b.vx; b.y+=b.vy; ctx.fillStyle=b.color; ctx.fillRect(b.x-3,b.y-6,6,12); 
    if(player.invul>0){ if(rectHit(b.x-3,b.y-6,6,12,player.x,player.y,player.w,player.h)){ bullets.splice(i,1); } }
    else if(player.shield > 0){ if(rectHit(b.x-3,b.y-6,6,12,player.x,player.y,player.w,player.h)){ player.shield--; spawnParticles(b.x,b.y,'#88ddff',6,1); bullets.splice(i,1); sfx('hit'); } }
    else if(rectHit(b.x-3,b.y-6,6,12,player.x,player.y,player.w,player.h)){ player.lives--; spawnParticles(player.x,player.y,'#ff4081',12,2); bullets.splice(i,1); if(player.lives<=0){ endGame(); } else { respawnPlayer(); } }
    else if(b.y > H) bullets.splice(i,1);
  }

  // enemies
  for(let i=enemies.length-1;i>=0;i--){ const e=enemies[i]; e.y+=e.speed; ctx.fillStyle='#bbff66'; ctx.fillRect(e.x,e.y,e.size,e.size); if(e.cooldown>0) e.cooldown--; else { bullets.push({ x:e.x + e.size/2, y:e.y+e.size, vx:(Math.random()-0.5)*2, vy:2.8, color:'#ff7bd6' }); e.cooldown = 60+Math.random()*80; } if(rectHit(player.x,player.y,player.w,player.h,e.x,e.y,e.size,e.size)){ if(player.invul<=0){ player.lives--; player.invul=120; spawnParticles(player.x,player.y,'#ff4081',12,2); if(player.lives<=0) endGame(); } } if(e.y > H) enemies.splice(i,1); }

  // asteroids
  for(let i=asteroids.length-1;i>=0;i--){ const a=asteroids[i]; a.y+=a.speed; a.rot += a.spin; ctx.save(); ctx.translate(a.x+a.size/2,a.y+a.size/2); ctx.rotate(a.rot); ctx.fillStyle='#ff9933'; ctx.fillRect(-a.size/2,-a.size/2,a.size,a.size); ctx.restore(); if(rectHit(player.x,player.y,player.w,player.h,a.x,a.y,a.size,a.size)){ if(player.invul<=0){ player.lives--; player.invul=120; spawnParticles(player.x,player.y,'#ff4081',12,2); if(player.lives<=0) endGame(); } } if(a.y > H) asteroids.splice(i,1); }

  // pickups
  for(let i=pickups.length-1;i>=0;i--){ const p=pickups[i]; p.y+=p.vy; ctx.fillStyle = p.type==='score' ? '#ffd700' : (p.type==='shield'?'#88ddff': p.type==='rapid'?'#ffea00': p.type==='spread'?'#ffd4b1': p.type==='bomb'?'#ff4081': '#00e6b8'); ctx.fillRect(p.x-6,p.y-6,12,12);
    if(rectHit(player.x,player.y,player.w,player.h,p.x-6,p.y-6,12,12)){ applyPickup(p.type); spawnParticles(p.x,p.y,ctx.fillStyle,10,1.5); pickups.splice(i,1); } else if(p.y > H) pickups.splice(i,1);
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){ const pt=particles[i]; pt.x += pt.vx; pt.y += pt.vy; pt.life--; pt.vy += 0.06; ctx.globalAlpha = Math.max(0, pt.life/100); ctx.fillStyle = pt.color; ctx.fillRect(pt.x-1.5,pt.y-1.5,3,3); if(pt.life<=0) particles.splice(i,1); }

  // floats
  for(let i=floats.length-1;i>=0;i--){ const f=floats[i]; f.y -= 0.6; f.life--; ctx.globalAlpha = f.alpha * Math.max(0, f.life/90); ctx.fillStyle = f.color; ctx.font='14px Orbitron, sans-serif'; ctx.textAlign='center'; ctx.fillText(f.txt,f.x,f.y); if(f.life<=0) floats.splice(i,1); }
  ctx.globalAlpha = 1;

  // boss drawing and AI
  if(activeBoss){ ctx.fillStyle = '#ff4081'; ctx.fillRect(activeBoss.x, activeBoss.y, activeBoss.w, activeBoss.h); const hpPercent = Math.max(0, activeBoss.hp / activeBoss.maxHp); ctx.fillStyle = '#ffea00'; ctx.fillRect(activeBoss.x, activeBoss.y - 12, activeBoss.w * hpPercent, 6);
    activeBoss.cooldown--; if(activeBoss.cooldown<=0){ const bx = activeBoss.x + activeBoss.w/2; const by = activeBoss.y + activeBoss.h; if(activeBoss.patternTimer%3===0){ bullets.push({x:bx,y:by,vx:-2,vy:3,color:'#ff7bd6'}); bullets.push({x:bx,y:by,vx:2,vy:3,color:'#ff7bd6'}); } activeBoss.cooldown=20; activeBoss.patternTimer++; }
    activeBoss.x += (activeBoss.x < W/2 ? 1.2 : -1.2);
    if(rectHit(player.x,player.y,player.w,player.h,activeBoss.x,activeBoss.y,activeBoss.w,activeBoss.h)){ if(player.invul<=0){ player.lives--; player.invul=120; if(player.lives<=0) endGame(); } }
  }

  // respawn allies with improved movement
  if(!aiAlpha.alive){ aiAlpha.respawn--; if(aiAlpha.respawn<=0){ aiAlpha.alive=true; aiAlpha.x = player.x; aiAlpha.moveTimer=0; } }
  if(!aiBeta.alive && shopOwned.includes('cheat_drone')){ aiBeta.respawn--; if(aiBeta.respawn<=0){ aiBeta.alive=true; aiBeta.x = player.x+40; aiBeta.moveTimer=0; } }
  if(!aiGamma.alive && shopOwned.includes('cheat_drone')){ aiGamma.respawn--; if(aiGamma.respawn<=0){ aiGamma.alive=true; aiGamma.x = player.x-40; aiGamma.moveTimer=0; } }

  if(comboTimer>0) comboTimer--; else multiplier = Math.max(1, multiplier - 0.03);
  if(frame % 120 === 0){ localStorage.setItem(SHOP_KEYS.XP, String(playerXP)); localStorage.setItem(SHOP_KEYS.POINTS, String(shopPoints)); localStorage.setItem(SHOP_KEYS.LEVEL, String(playerLevel)); }

  updateHUD(); if(!isOver) requestAnimationFrame(loop);
}

// ----------------------------- Drawing & AI Improvements -----------------------------
function drawBackground(){ ctx.fillStyle='rgba(4,4,10,0.25)'; ctx.fillRect(0,0,cvs.width/(window.devicePixelRatio||1),cvs.height/(window.devicePixelRatio||1));
  const W = cvs.width/(window.devicePixelRatio||1), H = cvs.height/(window.devicePixelRatio||1);
  const g = ctx.createLinearGradient(0,0,W,H); g.addColorStop(0,'rgba(0,20,50,0.06)'); g.addColorStop(1,'rgba(40,0,30,0.02)'); ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  for(let i=0;i<160;i++){ const x=(i*71 + frame*0.44) % W; const y=((i*53) % H) + Math.sin((frame + i)*0.02)*1.2; const s=(i%9===0)?2:1; ctx.fillStyle=(i%17===0)?'#00e6b8':(i%11===0)?'#ffdce6':'#9fb6f5'; ctx.fillRect(x,y,s,s); }
}

function drawPlayer(pl){ ctx.save(); if(pl.invul>0) ctx.globalAlpha = 0.6 + Math.sin(frame*0.4)*0.2;
  let skinColor = '#00e6b8'; if(pl.skin==='neon') skinColor='#ff4dff'; if(pl.skin==='onyx') skinColor='#00bfff'; ctx.shadowBlur=18; ctx.shadowColor=skinColor; ctx.fillStyle=skinColor; ctx.beginPath(); ctx.moveTo(pl.x+pl.w/2,pl.y); ctx.lineTo(pl.x+pl.w,pl.y+pl.h); ctx.lineTo(pl.x+pl.w/2,pl.y+pl.h-6); ctx.lineTo(pl.x,pl.y+pl.h); ctx.closePath(); ctx.fill();
  if(pl.shield>0){ ctx.strokeStyle='#88ddff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(pl.x+pl.w/2,pl.y+pl.h/2,pl.w,0,Math.PI*2); ctx.stroke(); }
  ctx.restore();
}

function aiTick(ai,accuracy=1,splitShot=false,single=false){ if(!ai.alive) return; const W = cvs.width/(window.devicePixelRatio||1); const targets = activeBoss? [activeBoss] : (asteroids.length ? asteroids : enemies); 
  let target = targets.length ? targets[Math.floor(Math.random()*targets.length)] : null;
  
  // Improved movement: prevent getting stuck, add random direction changes
  ai.moveTimer++; if(ai.moveTimer > 80 || ai.x < 10 || ai.x > W - ai.w - 10){ ai.moveDir *= -1; ai.moveTimer = 0; }
  ai.x += ai.speed * ai.moveDir;
  ai.x = Math.max(0, Math.min(W - ai.w, ai.x));

  // Fire at targets
  if(target){ if(ai.cooldown<=0){ const targetCenterX = target.x + target.size/2; const spread = splitShot ? 15 : 0; const offsets = splitShot ? [-spread, 0, spread] : [0]; for(let off of offsets){ lasers.push({ x: ai.x + ai.w/2 + off, y: ai.y, vy: 9, color: '#ffff00', dmg: 1 }); } ai.cooldown = 35 + Math.random()*25; } ai.cooldown--; } else { ai.cooldown--; if(ai.cooldown<0) ai.cooldown=0; }
  
  ctx.fillStyle='#ffff00'; ctx.fillRect(ai.x,ai.y,ai.w,ai.h);
  ctx.strokeStyle='#ffea00'; ctx.lineWidth=1; ctx.strokeRect(ai.x,ai.y,ai.w,ai.h);
}

function shotFrom(x,y,color,dmg,fromPlayer){ const spreads = player.spread ? [-10,0,10] : [0]; for(let off of spreads) lasers.push({ x: x+off, y: y, vy: 11, color: color, dmg: dmg }); }

function applyPickup(type){ if(type==='rapid'){ player.rapid=true; player.rate = Math.max(6, player.rate * 0.7); setTimeout(()=>{ player.rapid=false; },16000); showFloating('RAPID +', player.x, player.y, '#ffea00'); }
  else if(type==='shield'){ player.shield = Math.min(3, player.shield+1); showFloating('SHIELD', player.x, player.y, '#88ddff'); }
  else if(type==='spread'){ player.spread=true; setTimeout(()=>{ player.spread=false; },12000); showFloating('SPREAD', player.x, player.y, '#ffd4b1'); }
  else if(type==='score'){ score += 100 * multiplier; playerXP += 20; showFloating('BONUS!', player.x, player.y, '#ffd700'); }
  else if(type==='bomb'){ for(let e of enemies) spawnParticles(e.x, e.y, '#ff4081', 8, 2); enemies=[]; showFloating('BOMB!', player.x, player.y, '#ff4081'); }
  else if(type==='homing'){ lasers.push({x:player.x,y:player.y,vy:12,color:'#00e6b8',dmg:3,homing:true}); showFloating('HOMING', player.x, player.y, '#00e6b8'); }
}

requestAnimationFrame(function idle(){ drawBackground(); ctx.globalAlpha = 0.6; drawPlayer({x:450,y:420,w:28,h:24,shield:false,invul:0,skin:player.skin}); ctx.globalAlpha = 1; if(!running) requestAnimationFrame(idle); });

// ----------------------------- Shop UI & Global Leaderboard (Firebase Simulator) -----------------------------
const shopBtn = document.getElementById('shopBtn'); const lbBtn = document.getElementById('lbBtn'); const fsBtn = document.getElementById('fsBtn'); const muteBtn = document.getElementById('muteBtn');
shopBtn.addEventListener('click', openShop); lbBtn.addEventListener('click', openLeaderboard); fsBtn.addEventListener('click', toggleFullscreen); muteBtn.addEventListener('click', ()=>{ toggleMute(); });

function openShop(){ overlay.style.display='flex'; panel.innerHTML = `<h2>Shop</h2><div class="shop-grid"><div class="shop-item"><div><strong>Rapid Fire</strong><div class="small">Permanently increase firing rate</div></div><button class="btn" onclick="purchase('rapid_fire',150)">150pt</button></div><div class="shop-item"><div><strong>Shield Generator</strong><div class="small">Absorb 3 hits</div></div><button class="btn" onclick="purchase('shield_gen',120)">120pt</button></div><div class="shop-item"><div><strong>Spread Shot</strong><div class="small">Fire 3 projectiles</div></div><button class="btn" onclick="purchase('spread_shot',100)">100pt</button></div><div class="shop-item"><div><strong>Cheat Drones</strong><div class="small">Unlock ally AI</div></div><button class="btn" onclick="purchase('cheat_drone',200)">200pt</button></div></div><div class="small">Credits: ${shopPoints}</div><button class="btn" onclick="claimDaily()">Claim Daily (500pt)</button><button class="btn" onclick="overlay.style.display='none'">Close</button>`; }

function purchase(item,cost){ if(shopPoints < cost){ alert('Not enough credits — play to earn more or wait for daily reward.'); return; } if(shopOwned.includes(item)){ alert('Already owned'); return; } shopOwned.push(item); shopPoints -= cost; localStorage.setItem(SHOP_KEYS.OWNED, JSON.stringify(shopOwned)); localStorage.setItem(SHOP_KEYS.POINTS, String(shopPoints)); applyShopOwned(); alert('Purchased: ' + item); openShop(); }

// Global Leaderboard with fetch
let globalLBCache = null; let lastLBFetch = 0;
async function fetchGlobalLeaderboard(){ try { const response = await fetch('https://script.google.com/macros/d/1A1B2C3D4E5F6G7H8I9J0K1L2M3N4O5P6Q7R8S9T0/usercontent'); if(!response.ok) throw new Error('Failed'); const data = await response.json(); globalLBCache = data.scores || []; lastLBFetch = Date.now(); return globalLBCache; } catch(e){ console.warn('Global leaderboard fetch failed, using local'); return JSON.parse(localStorage.getItem(SHOP_KEYS.LEADER) || '[]'); } }

function openLeaderboard(){ overlay.style.display='flex'; panel.innerHTML = `<h2>🏆 Global Leaderboard</h2><div class="leaderboard"><div style="text-align:center;padding:20px"><span class="loading-spinner"></span> Loading scores...</div></div>`; 
  fetchGlobalLeaderboard().then(scores => { let html = '<div class="leaderboard">'; (scores || []).sort((a,b) => (b.score||0) - (a.score||0)).slice(0,50).forEach((s, i) => { html += `<div class="lb-row ${i<3?'top3':''}"><span class="lb-rank">#${i+1}</span><span class="lb-name">${s.name||'?'}</span><span class="lb-score">${s.score||0}</span></div>`; }); html += '</div>'; panel.innerHTML = `<h2>🏆 Global Leaderboard</h2>${html}<button class="btn" onclick="overlay.style.display='none'">Close</button>`; });
}

function toggleFullscreen(){ if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{}); else document.exitFullscreen(); }

// ----------------------------- Scoring & Global Save (Supabase Fallback) ----------------------------- 
function calcLevel(xp){ return Math.floor(1 + Math.pow(xp, 0.45)); }

async function saveScore(){ playerLevel = calcLevel(playerXP); const name = (shopUser && shopUser.name) ? shopUser.name : 'Guest'; shopPoints += Math.floor(score / 50); // earn credits
  const payload = { name, score, timestamp: new Date().toISOString(), level: playerLevel, xp: Math.floor(playerXP) };
  localStorage.setItem(SHOP_KEYS.POINTS, String(shopPoints)); localStorage.setItem(SHOP_KEYS.LEVEL, String(playerLevel));
  
  // Try to save to public leaderboard (Supabase/Firebase)
  try { await fetch('https://your-api-endpoint.supabase.co/rest/v1/leaderboard', { method: 'POST', headers: { 'Content-Type': 'application/json', 'apikey': 'public-key' }, body: JSON.stringify(payload) }); } catch(e){ console.log('Cloud save skipped'); }
  
  // Fallback: save locally
  const board = JSON.parse(localStorage.getItem(SHOP_KEYS.LEADER) || '[]'); board.push(payload); board.sort((a,b)=>b.score-a.score); localStorage.setItem(SHOP_KEYS.LEADER, JSON.stringify(board.slice(0,100)));
}

function shareScore(){ const text = `I scored ${score} in Cosmic Dodger! Can you beat me? Level ${playerLevel} ⭐`; if(navigator.share){ navigator.share({ title:'Cosmic Dodger Premium', text }); } else { navigator.clipboard.writeText(text); alert('Copied to clipboard!'); } }

// ----------------------------- Daily Reward --------------------
function claimDaily(){ const last = Number(localStorage.getItem('dodger_last_daily') || 0); const now = Date.now(); if(now - last < 24*3600*1000){ const hours = Math.floor((24*3600*1000 - (now - last))/3600000); alert(`Daily already claimed. Return in ${hours}h!`); return; } shopPoints += 500; localStorage.setItem(SHOP_KEYS.POINTS, String(shopPoints)); localStorage.setItem('dodger_last_daily', String(now)); alert('Claimed 500 credits! 🎁'); openShop(); }

// ----------------------------- User Setup --------------------
function setUser(name){ shopUser = { name:name||'Guest', source:'local' }; localStorage.setItem(SHOP_KEYS.USER, JSON.stringify(shopUser)); window.dodgerUser = shopUser; updateHUD(); }

if(!shopUser){ setTimeout(()=>{ const name = prompt('Choose a player name (optional):','Player'); if(name) setUser(name); },400); }

// ----------------------------- Misc --------------------
window.syncDodgerOwned = applyShopOwned;
document.addEventListener('keydown', (e)=>{ if(e.key==='d' || e.key==='D'){ claimDaily(); } });
window.addEventListener('pointerdown', ()=>{ try{ ensureAudio(); if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); }catch(e){} },{once:true});

</script>
